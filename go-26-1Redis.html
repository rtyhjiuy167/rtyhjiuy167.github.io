    <div class="post-body" itemprop="articleBody">
        <figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash"> Redis安装好后，默认有16个数据库，初始默认使用0号数据库 数据库的编号为0……15</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 其监听的端口为 6379</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 1.添加 key-val <span class="built_in">set</span> key value [expiration EX seconds|PX milliseconds] [NX|XX]</span></span><br><span class="line">set key1 hello #添加key为key1，value为hello</span><br><span class="line"><span class="meta">#</span><span class="bash"> 2.获取key对应的值 get key</span></span><br><span class="line">get key1 #得到 key为 key1 的 value</span><br><span class="line"><span class="meta">#</span><span class="bash"> 3.删除 key    del key [key ...]</span></span><br><span class="line">del key1</span><br><span class="line"><span class="meta">#</span><span class="bash"> 4.查看当前redis的所有 key [keys *]</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 5.切换 redis 数据库  select index</span></span><br><span class="line">select 1 #切换到1号数据库</span><br><span class="line"><span class="meta">#</span><span class="bash"> 6.查看当前数据库的 key-val 数量</span></span><br><span class="line">dbsize</span><br><span class="line"><span class="meta">#</span><span class="bash"> 7.清空所有数据库的 key-val</span></span><br><span class="line">flushall</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">Redis的五大数据类型：String(字符串)、Hash(哈希)、List(列表)、Set(集合)、zset(有序集合)</span><br></pre></td></tr></table></figure>

<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">String</span><br><span class="line">string类型是二进制安全的。除普通的字符串外，也可以存放图片等资源</span><br><span class="line">redis中字符串 value 最大是512M</span><br><span class="line"><span class="meta">#</span><span class="bash"> 可以存放中文</span> </span><br><span class="line">set address 北京 # Ok</span><br><span class="line">get address     #&quot;\xb1\xb1\xbe\xa9&quot;  仅仅只是在控制台会显示不正确 用程序读出来还是正确的</span><br></pre></td></tr></table></figure>

<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash"> setex(<span class="built_in">set</span> with expire) 设置生存时间</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> setex key seconds value</span></span><br><span class="line">setex key1 10 hello # 10s后就会删掉</span><br><span class="line">get key1</span><br></pre></td></tr></table></figure>

<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash"> mset 同时设置一个或多个 key-value 对</span>  </span><br><span class="line"><span class="meta">#</span><span class="bash"> mget 返回给定的一个或多个字符串键的值</span></span><br><span class="line">mset worker01 Tom worker02 Tony</span><br><span class="line">mget worker01 worker02</span><br></pre></td></tr></table></figure>

<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line">Hash</span><br><span class="line">Redis hash是一个键值对集合。 var user1 map[string]string</span><br><span class="line">Redis hash是一个string类型的field和value的映射表，hash特别适合用于存储对象</span><br><span class="line"><span class="meta">#</span><span class="bash"> hset key field value</span></span><br><span class="line">hset user1 name &quot;Tom&quot; #引号可加可不加</span><br><span class="line">hset user1 age 30</span><br><span class="line">hset user1 gender 0</span><br><span class="line"><span class="meta">#</span><span class="bash"> 可写成一行</span></span><br><span class="line">hset user1 name &quot;Tom&quot; age 30 gender 0</span><br><span class="line">hmset user1 name &quot;Tom&quot; age 30 gender 0</span><br><span class="line"><span class="meta">#</span><span class="bash"> hget key field 只能一个一个取</span></span><br><span class="line">hget user1 name</span><br><span class="line">hget user1 age</span><br><span class="line">hget user1 gender</span><br><span class="line"><span class="meta">#</span><span class="bash">  hmget key field [field ...] 可取一个或多个</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> hgetall key 得到全部</span></span><br><span class="line">hgetall user1</span><br></pre></td></tr></table></figure>

<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br></pre></td><td class="code"><pre><span class="line">List</span><br><span class="line">列表是简单的字符串列表，按照插入顺序排序。你可以添加一个元素到列表的头部（左边）或者尾部（右边）</span><br><span class="line">List本质是个链表，List的元素是有序的，元素的值可以重复</span><br><span class="line">List可以想象成一个管道</span><br><span class="line"><span class="meta">#</span><span class="bash"> lpush key value [value ...] 从左边依次插入，先插入的向右移</span></span><br><span class="line">lpush city beijing shanghai tianjing</span><br><span class="line"><span class="meta">#</span><span class="bash"> lrange key start stop</span> </span><br><span class="line">lrange city 0 -1  # 从第一个取到最后一个</span><br><span class="line"><span class="meta">#</span><span class="bash"> 1) <span class="string">&quot;tianjing&quot;</span></span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 2) <span class="string">&quot;shanghai&quot;</span></span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 3) <span class="string">&quot;beijing&quot;</span></span></span><br><span class="line"><span class="meta">#</span><span class="bash"> rpush key value [value ...] 从右边依次插入</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#</span><span class="bash"> lpop key 将列表中的最左边的数据弹出</span></span><br><span class="line">lpop city</span><br><span class="line"><span class="meta">#</span><span class="bash"> rpop key 将列表中的最右边的数据弹出</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> del key [key ...] 删除列表</span></span><br><span class="line">del city</span><br><span class="line"><span class="meta">#</span><span class="bash"> lindex key index 按照索引下标获得元素（从左到右，编号从0开始）</span></span><br><span class="line">lindex city 1</span><br><span class="line"><span class="meta">#</span><span class="bash"> LLen 返回列表 key 的长度，如果 key 不存在，则 key 被解释为一个空列表，返回0</span></span><br></pre></td></tr></table></figure>

<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">Set</span><br><span class="line">Redis的Set是string类型的无序集合</span><br><span class="line">底层是HashTable数据结构，Set也是存放很多字符串元素，字符串元素是无序的，而且元素的值不能重复</span><br><span class="line"><span class="meta">#</span><span class="bash"> sadd key member [member ...]</span></span><br><span class="line">sadd emails kk@yy.cn ss@ss.com</span><br><span class="line"><span class="meta">#</span><span class="bash"> smembers key 从集合中取出所有值，该集合即变为空</span></span><br><span class="line">smembers emails</span><br><span class="line"><span class="meta">#</span><span class="bash"> sismember key member 判断值是否是成员</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> srem key member [member ...] 删除指定值</span></span><br></pre></td></tr></table></figure>
