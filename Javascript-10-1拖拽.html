ne">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;!DOCTYPE <span class="meta-keyword">html</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">html</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span></span><br><span class="line">        * &#123;</span><br><span class="line"><span class="css">            <span class="attribute">margin</span>: <span class="number">0px</span>;</span></span><br><span class="line"><span class="css">            <span class="attribute">padding</span>: <span class="number">0px</span>;</span></span><br><span class="line">        &#125;</span><br><span class="line">    <span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">&quot;box1&quot;</span> <span class="attr">style</span>=<span class="string">&quot;width:100px;height:100px;background-color:aqua;position: absolute;&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">button</span> <span class="attr">id</span>=<span class="string">&quot;btn01&quot;</span>&gt;</span>btn01:点我一下<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">button</span> <span class="attr">id</span>=<span class="string">&quot;btn02&quot;</span>&gt;</span>btn02:点我一下<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">button</span> <span class="attr">id</span>=<span class="string">&quot;btn03&quot;</span>&gt;</span>btn03:点我一下<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line">        /** </span><br><span class="line">         * 拖拽box1元素</span><br><span class="line">         *  拖拽流程</span><br><span class="line">         *      1.当鼠标在被拖拽元素上按下时，开始拖拽 onmousedown</span><br><span class="line">         *      2.当鼠标移动时，被拖拽元素跟随鼠标移动  onmousemove</span><br><span class="line">         *      3.当鼠标松开时，被拖拽元素固定在当前的位置 onmouseup</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> box1 = <span class="built_in">document</span>.getElementById(<span class="string">&quot;box1&quot;</span>);</span></span><br><span class="line"><span class="javascript">        box1.onmousedown = <span class="function"><span class="keyword">function</span> (<span class="params">event</span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            event = event || <span class="built_in">window</span>.event;</span></span><br><span class="line">            /** </span><br><span class="line">             * 实现鼠标拖拽时，不是仅仅只是box1的左上角跟随鼠标，而是点哪以哪位标准</span><br><span class="line">             * </span><br><span class="line">            */</span><br><span class="line"><span class="javascript">            <span class="keyword">var</span> ol = event.clientX - box1.offsetLeft;</span></span><br><span class="line"><span class="javascript">            <span class="comment">//clientX 位鼠标距页面左边的距离 offsetLeft是距offsetparent的距离，在此html中其实都是html</span></span></span><br><span class="line"><span class="javascript">            <span class="keyword">var</span> ot = event.clientY - box1.offsetTop;</span></span><br><span class="line"><span class="javascript">            <span class="comment">//移动是在document里的,所以给document绑定</span></span></span><br><span class="line"><span class="javascript">            <span class="built_in">document</span>.onmousemove = <span class="function"><span class="keyword">function</span> (<span class="params">event</span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">                event = event || <span class="built_in">window</span>.event;</span></span><br><span class="line"><span class="javascript">                <span class="comment">//这个event和之前的event是不用样的，触发的事件就不一样</span></span></span><br><span class="line"><span class="javascript">                <span class="keyword">var</span> left = event.clientX;</span></span><br><span class="line"><span class="javascript">                <span class="keyword">var</span> top = event.clientY;</span></span><br><span class="line"><span class="javascript">                box1.style.left = left - ol + <span class="string">&quot;px&quot;</span>;</span></span><br><span class="line"><span class="javascript">                box1.style.top = top - ot + <span class="string">&quot;px&quot;</span>;</span></span><br><span class="line">            &#125;</span><br><span class="line"><span class="javascript">            <span class="comment">//若兄弟元素有重叠时，绑在box1时不会触发box1的onmouseup，所以应绑在document</span></span></span><br><span class="line"><span class="javascript">            <span class="built_in">document</span>.onmouseup = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">                <span class="comment">//当鼠标松开时，被拖拽元素固定在当前位置</span></span></span><br><span class="line"><span class="javascript">                <span class="comment">//取消document的onmousmove事件即可</span></span></span><br><span class="line"><span class="javascript">                <span class="built_in">document</span>.onmousemove = <span class="literal">null</span>;</span></span><br><span class="line"><span class="javascript">                <span class="comment">//onmouseup触发后会一直没有存在意义，须覆盖掉</span></span></span><br><span class="line"><span class="javascript">                <span class="comment">//  否则在其它处进行鼠标松开后仍会触发</span></span></span><br><span class="line"><span class="javascript">                <span class="built_in">document</span>.onmouseup = <span class="literal">null</span>;</span></span><br><span class="line">            &#125;</span><br><span class="line"></span><br><span class="line">            /** </span><br><span class="line">             * 当我们拖拽一个页面中的内容时，如全选拖拽，浏览器会默认去搜索引擎中搜索</span><br><span class="line">             *  此时或导致拖拽功能异常</span><br><span class="line"><span class="javascript">             *  如果不希望发生这个行为，则可以通过<span class="keyword">return</span> <span class="literal">false</span>来取消默认行为</span></span><br><span class="line">            */</span><br><span class="line"><span class="javascript">            <span class="keyword">return</span> <span class="literal">false</span>;</span></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="comment">//还得考虑滚动条的问题</span></span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> btn02 = <span class="built_in">document</span>.getElementById(<span class="string">&quot;btn02&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> btn03 = <span class="built_in">document</span>.getElementById(<span class="string">&quot;btn03&quot;</span>);</span></span><br><span class="line"><span class="javascript">        btn02.onclick = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            alert(<span class="string">&quot;btn02&quot;</span>);</span></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        btn03.onclick = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            alert(<span class="string">&quot;btn03&quot;</span>);</span></span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        /**</span><br><span class="line">         * 当调用一个元素的setCapture()方法以后</span><br><span class="line">         *   这个元素将会把下一次所以的鼠标按下的相关事件捕获到自己身上</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">       <span class="comment">//IE8才用：btn03.setCapture();  //应该都不用了吧？？IE11了</span></span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
