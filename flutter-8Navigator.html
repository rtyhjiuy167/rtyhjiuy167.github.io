n><br><span class="line">          <span class="comment">// result 接收 上个页面的 pop() 方法里的参数 当上个页面pop()执行时，该页面就会收到，不需要点击按钮再执行</span></span><br><span class="line">          <span class="keyword">var</span> result = <span class="keyword">await</span> Navigator.push(</span><br><span class="line">              <span class="comment">//等待其取得返回值后再执行 print</span></span><br><span class="line">              <span class="comment">//Navigator.push 将给定的路由入栈（即打开新的页面），返回值是一个Future对象，用以接收新路由出栈（即关闭）时的返回数据</span></span><br><span class="line">              context,</span><br><span class="line">              MaterialPageRoute(</span><br><span class="line">                builder: (context) &#123;</span><br><span class="line">                  <span class="keyword">return</span> MenuPage(); <span class="comment">//当然 跳转到新页面时 可通过 widget 传参</span></span><br><span class="line">                &#125;,</span><br><span class="line">                settings: RouteSettings(name: <span class="string">&quot;&quot;</span>),</span><br><span class="line">                maintainState: <span class="keyword">false</span>, <span class="comment">//默认为 true</span></span><br><span class="line">              ));</span><br><span class="line">          <span class="built_in">print</span>(result);</span><br><span class="line">        &#125;,</span><br><span class="line">        child: Text(<span class="string">&quot;跳转&quot;</span>),</span><br><span class="line">      ),</span><br><span class="line">    );</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">MenuPage</span> <span class="keyword">extends</span> <span class="title">StatelessWidget</span> </span>&#123;</span><br><span class="line">  <span class="keyword">const</span> MenuPage(&#123;Key? key&#125;) : <span class="keyword">super</span>(key: key);</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  Widget build(BuildContext context) &#123;</span><br><span class="line">    <span class="keyword">return</span> Scaffold(</span><br><span class="line">      appBar: AppBar(</span><br><span class="line">        title: Text(<span class="string">&quot;菜单&quot;</span>),</span><br><span class="line">      ),</span><br><span class="line">      body: Column(children: [</span><br><span class="line">        ElevatedButton(</span><br><span class="line">            onPressed: () &#123;</span><br><span class="line">              <span class="comment">//返回到上个界面</span></span><br><span class="line">              <span class="comment">//pop 可接收一个任意类型的参数 用于页面传参</span></span><br><span class="line">              Navigator.of(context).pop(<span class="string">&quot;result&quot;</span>);</span><br><span class="line">              <span class="comment">//将栈顶路由出栈，&quot;result&quot;  为页面关闭时返回给上一个页面的数据</span></span><br><span class="line">            &#125;,</span><br><span class="line">            child: Text(<span class="string">&quot;返回&quot;</span>)),</span><br><span class="line">        ElevatedButton(</span><br><span class="line">            onPressed: () &#123;</span><br><span class="line">              Navigator.of(context)</span><br><span class="line">                  .push(MaterialPageRoute(</span><br><span class="line">                      builder: (context) &#123;</span><br><span class="line">                        <span class="keyword">return</span> NextPage();</span><br><span class="line">                      &#125;,</span><br><span class="line">                      settings:</span><br><span class="line">                          RouteSettings(arguments: <span class="string">&quot;MenoPage turn NextPage&quot;</span>)))</span><br><span class="line">                  <span class="comment">//由pop到此页且 pop 有传值时才会走 then</span></span><br><span class="line">                  .then((value) =&gt; <span class="built_in">print</span>(value));</span><br><span class="line">            &#125;,</span><br><span class="line">            child: Text(<span class="string">&quot;下一页&quot;</span>)),</span><br><span class="line">      ]),</span><br><span class="line">    );</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">NextPage</span> <span class="keyword">extends</span> <span class="title">StatelessWidget</span> </span>&#123;</span><br><span class="line">  <span class="keyword">const</span> NextPage(&#123;Key? key&#125;) : <span class="keyword">super</span>(key: key);</span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  Widget build(BuildContext context) &#123;</span><br><span class="line">    <span class="built_in">dynamic</span> _arguments = ModalRoute.of(context)</span><br><span class="line">        ?.settings</span><br><span class="line">        .arguments; <span class="comment">//setting 要判断是否为 null 在 . 前加 ? 即可</span></span><br><span class="line">    <span class="comment">//接收到此页面的 ModelRoute 里的 setting.arguments</span></span><br><span class="line">    <span class="keyword">return</span> Scaffold(</span><br><span class="line">        appBar: AppBar(</span><br><span class="line">          title: Text(_arguments),</span><br><span class="line">        ),</span><br><span class="line">        body: ElevatedButton(</span><br><span class="line">            onPressed: () &#123;</span><br><span class="line">              Navigator.of(context).pushNamed(<span class="string">&quot;finalpage&quot;</span>,</span><br><span class="line">                  arguments: <span class="comment">//这里相当于是settings.arguments</span></span><br><span class="line">                      <span class="string">&quot;参数字符串 已跳到FinalPage &quot;</span>); <span class="comment">//若上个页面是通过 settings.arguments 传值的 这里 then 是接收不到的</span></span><br><span class="line">            &#125;,</span><br><span class="line">            child: Text(<span class="string">&quot;命名路由传参&quot;</span>)));</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">FinalPage</span> <span class="keyword">extends</span> <span class="title">StatelessWidget</span> </span>&#123;</span><br><span class="line">  <span class="keyword">const</span> FinalPage(&#123;Key? key&#125;) : <span class="keyword">super</span>(key: key);</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  Widget build(BuildContext context) &#123;</span><br><span class="line">    <span class="built_in">dynamic</span> _arguments = ModalRoute.of(context)?.settings.arguments;</span><br><span class="line">    <span class="keyword">return</span> Scaffold(</span><br><span class="line">        appBar: AppBar(</span><br><span class="line">          title: Text(_arguments),</span><br><span class="line">        ),</span><br><span class="line">        body: ElevatedButton(</span><br><span class="line">          onPressed: () &#123;</span><br><span class="line">            <span class="built_in">print</span>(_arguments);</span><br><span class="line">            Navigator.of(context).popAndPushNamed(<span class="string">&quot;welecomepage&quot;</span>,</span><br><span class="line">                arguments:</span><br><span class="line">                    <span class="string">&quot;WeleComePage&quot;</span>); <span class="comment">//popAndPushNamed 相对于先执行 pop 再执行 pushNamed //注意：pop到上一页是会执行回调</span></span><br><span class="line">          &#125;,</span><br><span class="line">          child: Text(<span class="string">&quot;点击跳转WeleComePage&quot;</span>),</span><br><span class="line">        ));</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">WeleComePage</span> <span class="keyword">extends</span> <span class="title">StatelessWidget</span> </span>&#123;</span><br><span class="line">  <span class="keyword">const</span> WeleComePage(&#123;Key? key&#125;) : <span class="keyword">super</span>(key: key);</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  Widget build(BuildContext context) &#123;</span><br><span class="line">    <span class="built_in">dynamic</span> _arguments = ModalRoute.of(context)?.settings.arguments;</span><br><span class="line">    <span class="keyword">return</span> Scaffold(</span><br><span class="line">        appBar: AppBar(</span><br><span class="line">          title: Text(_arguments),</span><br><span class="line">        ),</span><br><span class="line">        body: ElevatedButton(</span><br><span class="line">          onPressed: () &#123;</span><br><span class="line">            <span class="built_in">print</span>(_arguments);</span><br><span class="line">          &#125;,</span><br><span class="line">          child: Text(<span class="string">&quot;你好&quot;</span>),</span><br><span class="line">        ));</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
