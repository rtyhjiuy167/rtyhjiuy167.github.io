        <figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> <span class="string">&quot;fmt&quot;</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	<span class="comment">//切片</span></span><br><span class="line">	<span class="comment">//Go 数组的长度不可改变，在特定场景中这样的集合就不太适用，Go 中提供了一种灵活，功能强悍的内置类型切片(&quot;动态数组&quot;)，</span></span><br><span class="line">	<span class="comment">//  与数组相比切片的长度是不固定的，可以追加元素，在追加时可以使切片的容量增大</span></span><br><span class="line">	<span class="keyword">var</span> s1 []<span class="keyword">int</span></span><br><span class="line"></span><br><span class="line">	fmt.Println(s1 == <span class="literal">nil</span>) <span class="comment">//true</span></span><br><span class="line">	<span class="comment">//Go语言中 nil 表示零值 零值相当于还没有开辟内存空间</span></span><br><span class="line">	<span class="comment">//布尔类型的零值(初始值)为 false,数值类型的零值为 0,字符串类型的零值为空字符串&quot;&quot;</span></span><br><span class="line">	<span class="comment">// 而指针、切片、映射、通道、函数和接口的零值则是 nil</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//长度和容量</span></span><br><span class="line">	s2 := [...]<span class="keyword">int</span>&#123;<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">4</span>, <span class="number">5</span>, <span class="number">6</span>&#125;</span><br><span class="line">	fmt.Printf(<span class="string">&quot;len(s2):%d  cap(s2):%d\n&quot;</span>, <span class="built_in">len</span>(s2), <span class="built_in">cap</span>(s2)) <span class="comment">//len(s2):6  cap(s2):6</span></span><br><span class="line">	<span class="comment">// printf可以在与模板字符串类似 而Println 只能使用 , 拼接方式</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//由数组得到切片 左包含，右不包含</span></span><br><span class="line">	s3 := s2[<span class="number">0</span>:<span class="number">4</span>]</span><br><span class="line">	fmt.Println(s3) <span class="comment">//[1 2 3 4]</span></span><br><span class="line">	s4 := s2[:<span class="number">4</span>]    <span class="comment">// 相当于 s2[0:4]</span></span><br><span class="line">	fmt.Println(s4) <span class="comment">//[1 2 3 4]</span></span><br><span class="line">	s5 := s2[:]     <span class="comment">// 相当于 s2[0:len(s2)]</span></span><br><span class="line">	fmt.Println(s5)</span><br><span class="line">	<span class="comment">//切片后得到的数组的容量是指底层数组的长度</span></span><br><span class="line">	fmt.Printf(<span class="string">&quot;len(s4):%d  cap(s4):%d\n&quot;</span>, <span class="built_in">len</span>(s4), <span class="built_in">cap</span>(s4)) <span class="comment">//len(s4):4  cap(s4):6</span></span><br><span class="line">	fmt.Println(<span class="built_in">cap</span>(s4) == <span class="built_in">cap</span>(s2))                          <span class="comment">//true</span></span><br><span class="line">	<span class="comment">//切片再切片 得到数组的容量为前者的长度</span></span><br><span class="line">	s6 := s4[<span class="number">1</span>:<span class="number">3</span>]</span><br><span class="line">	fmt.Printf(<span class="string">&quot;len(s6):%d  cap(s6):%d\n&quot;</span>, <span class="built_in">len</span>(s6), <span class="built_in">cap</span>(s6)) <span class="comment">//len(s6):2  cap(s6):4</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//注意：切片为引用类型</span></span><br><span class="line">	fmt.Println(<span class="string">&quot;s4：&quot;</span>, s4) <span class="comment">//[1 2 3 4]</span></span><br><span class="line">	fmt.Println(<span class="string">&quot;s6：&quot;</span>, s6) <span class="comment">//[2 3]</span></span><br><span class="line">	s4[<span class="number">2</span>] = <span class="number">300</span></span><br><span class="line">	s6[<span class="number">0</span>] = <span class="number">200</span></span><br><span class="line">	fmt.Println(<span class="string">&quot;s4：&quot;</span>, s4) <span class="comment">//[1 200 300 4]</span></span><br><span class="line">	fmt.Println(<span class="string">&quot;s6：&quot;</span>, s6) <span class="comment">//[200 300]</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
