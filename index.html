    <title>XuAnRuiの主页</title>
    <style>
        body {
            background-color: #9dc0ca;
            padding: 0px;
            margin: 0px;
        }

        #snowbanner {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
            background-color: rgb(148, 145, 145);

        }

        #snowbanner .snow {
            background-image: url("images/snow.png");
            background-repeat: repeat;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            -webkit-animation-timing-function: linear;
            animation-timing-function: linear;
            transition: opacity 3s;
        }

        #snowbanner .snow.snow-1 {
            -webkit-animation-name: animateone;
            animation-name: animateone;
            background-size: 500px 500px;
        }

        #snowbanner .snow.snow-2 {
            -webkit-animation-name: animatetwo;
            animation-name: animatetwo;
            background-size: 300px 300px;
        }

        @-webkit-keyframes animateone {
            0% {
                background-position: 0px 0px;
            }

            100% {
                background-position: 500px 500px;
            }
        }

        @keyframes animateone {
            0% {
                background-position: 0px 0px;
            }

            100% {
                background-position: 500px 500px;
            }
        }

        @-webkit-keyframes animatetwo {
            0% {
                background-position: 0px 0px;
            }

            100% {
                background-position: 300px 900px;
            }
        }

        @keyframes animatetwo {
            0% {
                background-position: 0px 0px;
            }

            100% {
                background-position: 300px 900px;
            }
        }

        .snow-speed-wrapper {
            position: fixed;
            width: 100%;
            bottom: 20px;
            z-index: 1000;
        }

        .snow-speed-wrapper .snow-speed-range {
            width: calc(100% - 40px);
            margin: auto;
            max-width: 500px;
            padding: 10px 30px;
            background: rgba(0, 0, 0, 0.3);
            transition: background 0.5s ease;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .snow-speed-wrapper .snow-speed-range:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        #range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #d7dcdf;
            outline: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
        }

        #range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 100%;
            background-color: #fff;
        }


        #toMyBlog {
            width: 120px;
           text-align: center;
            display: inline-block;
            position: fixed;
            height: 60px;
            line-height: 60px;
            left: calc(50% - 60px);
            top: 50% ;
            z-index: 1;
            font-size: 43px;
            text-shadow: 0 0 4px white;
            color: rgb(148, 145, 145);
            cursor: pointer;
        }
    </style>
</head>

<body itemscope itemtype="http://schema.org/WebPage">
    <div id="toMyBlog">blog</div>
    <div>
        <section id="snowbanner">
            <div class="snow snow-1"></div>
            <div class="snow snow-2"></div>
        </section>
        <div class="snow-speed-wrapper">
            <div class="snow-speed-range">
                <input id="range-slider" type="range">
            </div>
        </div>
    </div>

    <!-- <script src="snow.js"></script> -->
    <script>
        (function () {
            let speedSlider = document.querySelector("#range-slider");
            let speedValue = speedSlider.value;
            let snow = document.querySelectorAll("#snowbanner .snow");
            let snowSwitch = true;

            speedSlider.addEventListener("input", function () {
                speedValue = speedSlider.value;
                setSeconds();
            });

            function setSeconds() {
                let seconds = (100 - speedValue) * 0.2;
                if (seconds < 0.5) {
                    seconds = 0.5;
                }

                seconds >= 20 ? (snowSwitch = false) : (snowSwitch = true);

                snow.forEach(element => {
                    element.style.WebkitAnimationDuration = `${seconds}s`;
                    element.style.animationDuration = `${seconds}s`;

                    if (snowSwitch) {
                        element.style.WebkitAnimationIterationCount = "infinite";
                        element.style.animationIterationCount = "infinite";
                        element.style.opacity = "1";
                    } else {
                        element.style.WebkitAnimationIterationCount = "1";
                        element.style.animationIterationCount = "1";
                        element.style.opacity = "0";
                    }
                });
            }
            setSeconds();
        })();
    </script>
    <script language="javascript" type="text/javascript">
        document.getElementById("toMyBlog").addEventListener("click", () =>
            window.location.href = "https://www.rui123.xyz/index/"
        );
    </script>

</body>
