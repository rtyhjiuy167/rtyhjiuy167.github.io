pan> <span class="attr">charset</span>=<span class="string">&quot;UTF-8&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line">        /** </span><br><span class="line">         * push()</span><br><span class="line">         *  该方法可以向数组末尾添加一个或多个元素，并放回数组的新的长度</span><br><span class="line">         *  可以将要添加的元素作为方法的参数传递</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> arr = [<span class="string">&quot;孙悟空&quot;</span>, <span class="string">&quot;猪八戒&quot;</span>, <span class="string">&quot;沙和尚&quot;</span>];</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> count1 = arr.push(<span class="string">&quot;白骨精&quot;</span>, <span class="string">&quot;蜘蛛精&quot;</span>);<span class="comment">//5</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(count1);<span class="comment">// [&quot;孙悟空&quot;, &quot;猪八戒&quot;, &quot;沙和尚&quot;, &quot;白骨精&quot;, &quot;蜘蛛精&quot;]</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr);</span></span><br><span class="line">        /** </span><br><span class="line">         * pop()</span><br><span class="line">         *  该方法可以删除数组的最后一个元素，并将删除的元素作为返回值返回</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> result1 = arr.pop(<span class="string">&quot;孙悟空&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(result1);<span class="comment">// 蜘蛛精</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="keyword">typeof</span> result1);<span class="comment">//string</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr);<span class="comment">//[&quot;孙悟空&quot;, &quot;猪八戒&quot;, &quot;沙和尚&quot;, &quot;白骨精&quot;]</span></span></span><br><span class="line">        /**</span><br><span class="line">         * unshift()</span><br><span class="line">         *  该方法可向数组添加一个或多个元素，并返回新的数组的长度</span><br><span class="line">         *  向前边插入元素以后，其它的元素索引会依次调整</span><br><span class="line">         */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> count2 = arr.unshift(<span class="string">&quot;二郎神&quot;</span>, <span class="string">&quot;哮天犬&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(count2);<span class="comment">//6</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr);<span class="comment">//[&quot;二郎神&quot;, &quot;哮天犬&quot;, &quot;孙悟空&quot;, &quot;猪八戒&quot;, &quot;沙和尚&quot;, &quot;白骨精&quot;]</span></span></span><br><span class="line">        /**</span><br><span class="line">         * shift()</span><br><span class="line">         *该方法可以删除数组的第一个元素，并将删除的元素作为返回值返回</span><br><span class="line">         */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> result2 = arr.shift();</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(result2);<span class="comment">// 二郎神</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr);<span class="comment">//[&quot;哮天犬&quot;, &quot;孙悟空&quot;, &quot;猪八戒&quot;, &quot;沙和尚&quot;, &quot;白骨精&quot;]</span></span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
