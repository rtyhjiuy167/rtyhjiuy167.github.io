ss="string">&quot;net/http&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment">//创建处理器函数 用于处理请求</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">handler</span><span class="params">(w http.ResponseWriter, r *http.Request)</span></span> &#123;</span><br><span class="line">	<span class="comment">//通过直接调用FormValue方法和PostFormValue方法直接获取请求参数的值 不需要r.ParseForm()</span></span><br><span class="line">	fmt.Fprintln(w, <span class="string">&quot;URL中的user请求参数的值是：&quot;</span>, r.FormValue(<span class="string">&quot;username&quot;</span>))           <span class="comment">//优先表单</span></span><br><span class="line">	fmt.Fprintln(w, <span class="string">&quot;Form表单中的username请求参数的值：&quot;</span>, r.PostFormValue(<span class="string">&quot;username&quot;</span>)) <span class="comment">//仅表单</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">testJsonRes1</span><span class="params">(w http.ResponseWriter, r *http.Request)</span></span> &#123;</span><br><span class="line">	<span class="comment">//设置响应内容的类型</span></span><br><span class="line">	w.Header().Set(<span class="string">&quot;Content-Type&quot;</span>, <span class="string">&quot;application/json&quot;</span>)</span><br><span class="line">	<span class="comment">//创建User model是其它文件的 自己创一个User结构体就好了</span></span><br><span class="line">	user := model.User&#123;</span><br><span class="line">		ID:       <span class="number">1</span>,</span><br><span class="line">		Username: <span class="string">&quot;admin&quot;</span>,</span><br><span class="line">		Email:    <span class="string">&quot;admin@123.com&quot;</span>,</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">//将User转换为Json</span></span><br><span class="line">	json, _ := json.Marshal(user)</span><br><span class="line">	<span class="comment">//将json格式的数据响应给客户端</span></span><br><span class="line">	w.Write(json)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">testJsonRes2</span><span class="params">(w http.ResponseWriter, r *http.Request)</span></span> &#123;</span><br><span class="line">	<span class="comment">//1.设置响应头中的Location属性</span></span><br><span class="line">	w.Header().Set(<span class="string">&quot;Location&quot;</span>, <span class="string">&quot;https://www.baidu.com&quot;</span>)</span><br><span class="line">	<span class="comment">//2.设置响应的状态码</span></span><br><span class="line">	w.WriteHeader(<span class="number">302</span>)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	http.HandleFunc(<span class="string">&quot;/hello&quot;</span>, handler)</span><br><span class="line">	http.HandleFunc(<span class="string">&quot;/testJson&quot;</span>, testJsonRes1)</span><br><span class="line">	http.HandleFunc(<span class="string">&quot;/testRedircet&quot;</span>, testJsonRes2)</span><br><span class="line">	http.ListenAndServe(<span class="string">&quot;:8080&quot;</span>, <span class="literal">nil</span>)</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
