>&lt;<span class="name">head</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">h1</span>&gt;</span>Location<span class="tag">&lt;/<span class="name">h1</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">input</span> <span class="attr">type</span>=<span class="string">&quot;text&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">button</span> <span class="attr">id</span>=<span class="string">&quot;btn1&quot;</span>&gt;</span>1点我跳到百度<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">button</span> <span class="attr">id</span>=<span class="string">&quot;btn2&quot;</span>&gt;</span>2点我跳到百度<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">button</span> <span class="attr">id</span>=<span class="string">&quot;btn3&quot;</span>&gt;</span>刷新<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">button</span> <span class="attr">id</span>=<span class="string">&quot;btn4&quot;</span>&gt;</span>强制清空缓存刷新<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line">        /** </span><br><span class="line">         * 如果直接打印location,则可以获取到地址栏的信息（当前页面的完整路径）</span><br><span class="line">         * alert(location);</span><br><span class="line">         * </span><br><span class="line">         * 如果直接将locaation属性修改为一个完整的路径，或相对路径</span><br><span class="line">         *  则页面会自动跳转到该路径，并且会生成相应的历史记录</span><br><span class="line">         * </span><br><span class="line">         * assign() 与修改location一样</span><br><span class="line">         * </span><br><span class="line"><span class="javascript">         * reload()刷新 <span class="literal">true</span>强制清空缓存刷新</span></span><br><span class="line">         * </span><br><span class="line">         * replace()</span><br><span class="line">         *  与assign用法相同，但不会生成历史记录</span><br><span class="line">        */</span><br><span class="line"></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> btn1 = <span class="built_in">document</span>.getElementById(<span class="string">&quot;btn1&quot;</span>);</span></span><br><span class="line"><span class="javascript">        btn1.onclick = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            location = <span class="string">&quot;http://www.baidu.com&quot;</span>;</span></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> btn2 = <span class="built_in">document</span>.getElementById(<span class="string">&quot;btn2&quot;</span>);</span></span><br><span class="line"><span class="javascript">        btn2.onclick = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            location.assign(<span class="string">&quot;http://www.baidu.com&quot;</span>);</span></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> btn3 = <span class="built_in">document</span>.getElementById(<span class="string">&quot;btn3&quot;</span>);</span></span><br><span class="line"><span class="javascript">        btn3.onclick = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line">            location.reload();</span><br><span class="line"><span class="javascript">            <span class="comment">//Eage里默认强制清空缓存刷新</span></span></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> btn4 = <span class="built_in">document</span>.getElementById(<span class="string">&quot;btn4&quot;</span>);</span></span><br><span class="line"><span class="javascript">        btn4.onclick = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            location.reload(<span class="literal">true</span>);</span></span><br><span class="line"><span class="javascript">            <span class="comment">//true 强制清空缓存刷新</span></span></span><br><span class="line">        &#125;</span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
