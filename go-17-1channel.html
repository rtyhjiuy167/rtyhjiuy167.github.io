port</span> <span class="string">&quot;fmt&quot;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//channel是一种引用类型</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	<span class="keyword">var</span> ch <span class="keyword">chan</span> <span class="keyword">int</span></span><br><span class="line">	fmt.Println(ch) <span class="comment">// &lt;nil&gt;</span></span><br><span class="line">	<span class="comment">//声明的通道后需要使用make函数初始化之后才能使用</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">// make(chan 元素类型, [缓冲大小])  缓冲大小指能存几个值</span></span><br><span class="line">	<span class="comment">//通道关闭后仍能取值</span></span><br><span class="line"></span><br><span class="line">	ch1 := <span class="built_in">make</span>(<span class="keyword">chan</span> <span class="keyword">int</span>, <span class="number">1</span>) <span class="comment">//带缓冲区通道</span></span><br><span class="line">	ch1 &lt;- <span class="number">10</span>                <span class="comment">//发送值</span></span><br><span class="line">	x := &lt;-ch1</span><br><span class="line">	<span class="comment">// len(ch1)  取通道中元素的数量</span></span><br><span class="line">	<span class="comment">// cap(ch1)  拿到通道的容量</span></span><br><span class="line">	fmt.Println(x)</span><br><span class="line">	<span class="built_in">close</span>(ch1) <span class="comment">//关闭通道不是必须的 通道是可以被垃圾回收机制回收的</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//ch2 := make(chan int) //无缓冲区通道，又称为阻塞的通道</span></span><br><span class="line"></span><br><span class="line">	channal1 := <span class="built_in">make</span>(<span class="keyword">chan</span> <span class="keyword">int</span>, <span class="number">100</span>)</span><br><span class="line">	channal2 := <span class="built_in">make</span>(<span class="keyword">chan</span> <span class="keyword">int</span>, <span class="number">200</span>)</span><br><span class="line">	<span class="keyword">go</span> f1(channal1)</span><br><span class="line">	<span class="keyword">go</span> f2(channal1, channal2)</span><br><span class="line"></span><br><span class="line">	<span class="keyword">for</span> ret := <span class="keyword">range</span> channal2 &#123; <span class="comment">//for range 会自己判断是否取完值</span></span><br><span class="line">		fmt.Println(ret)</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">f1</span><span class="params">(ch <span class="keyword">chan</span>&lt;- <span class="keyword">int</span>)</span></span> &#123; <span class="comment">//通过 chan 右边加 &lt;- 可以确保 ch 在函数里只能 接收值</span></span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="number">100</span>; i++ &#123;</span><br><span class="line">		ch &lt;- i</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="built_in">close</span>(ch)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//从 ch1 中取出数据</span></span><br><span class="line"><span class="comment">//把结果发送到 ch2 中</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">f2</span><span class="params">(ch1 &lt;-<span class="keyword">chan</span> <span class="keyword">int</span>, ch2 <span class="keyword">chan</span>&lt;- <span class="keyword">int</span>)</span></span> &#123;</span><br><span class="line">	<span class="keyword">for</span> &#123;</span><br><span class="line">		temp, ok := &lt;-ch1</span><br><span class="line">		<span class="comment">//当能从 ch1 中取值时 ok 为 true，不能取值时为 false</span></span><br><span class="line">		<span class="keyword">if</span> !ok &#123;</span><br><span class="line">			<span class="keyword">break</span></span><br><span class="line">		&#125;</span><br><span class="line">		ch2 &lt;- temp</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="built_in">close</span>(ch2)</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
