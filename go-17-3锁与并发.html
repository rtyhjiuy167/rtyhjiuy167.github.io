">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;sync&quot;</span></span><br><span class="line">	<span class="string">&quot;time&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment">// 互斥锁 只能同一个 goroutine 读与写</span></span><br><span class="line"><span class="comment">//使用互斥锁能够保证同一时间有且只有一个goroutine进入临界区</span></span><br><span class="line"><span class="comment">//当互斥锁释放后，等待的goroutine才可以获取锁进入临界区，</span></span><br><span class="line"><span class="comment">//多个goroutine同时等待一个锁时，唤醒的策略是随机的</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">add1</span><span class="params">()</span></span> &#123;</span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="number">500000</span>; i++ &#123;</span><br><span class="line">		lock.Lock()</span><br><span class="line">		x = i</span><br><span class="line">		lock.Unlock()</span><br><span class="line">	&#125;</span><br><span class="line">	wg.Done()</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">add2</span><span class="params">()</span></span> &#123;</span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="number">499999</span>; i++ &#123;</span><br><span class="line">		lock.Lock()</span><br><span class="line">		x = i</span><br><span class="line">		lock.Unlock()</span><br><span class="line">	&#125;</span><br><span class="line">	wg.Done()</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">var</span> (</span><br><span class="line">	x    <span class="keyword">int</span></span><br><span class="line">	wg   sync.WaitGroup</span><br><span class="line">	lock sync.Mutex <span class="comment">//互斥锁</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	wg.Add(<span class="number">7</span>)</span><br><span class="line">	<span class="keyword">go</span> add1()</span><br><span class="line">	<span class="keyword">go</span> add2()</span><br><span class="line">	<span class="keyword">go</span> add1()</span><br><span class="line">	<span class="keyword">go</span> add2()</span><br><span class="line">	<span class="keyword">go</span> add1()</span><br><span class="line">	<span class="keyword">go</span> add2()</span><br><span class="line">	<span class="keyword">go</span> add1()</span><br><span class="line">	wg.Wait()</span><br><span class="line">	fmt.Println(x) <span class="comment">//可能是 499999,也可能是 499998</span></span><br><span class="line"></span><br><span class="line">	start := time.Now()</span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="number">1000</span>; i++ &#123;</span><br><span class="line">		wg.Add(<span class="number">1</span>)</span><br><span class="line">		<span class="keyword">go</span> read()</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="number">10</span>; i++ &#123;</span><br><span class="line">		wg.Add(<span class="number">1</span>)</span><br><span class="line">		<span class="keyword">go</span> write()</span><br><span class="line">	&#125;</span><br><span class="line">	wg.Wait()                      <span class="comment">//等待所有 goroutine 完成</span></span><br><span class="line">	fmt.Println(time.Since(start)) <span class="comment">//time. now (). sub (t)的简写</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//读写锁分为两种：读锁和写锁。</span></span><br><span class="line"><span class="comment">//当一个goroutine获取读锁之后，其他的goroutine如果是获取读锁会继续获得锁，如果是获取写锁就会等待；</span></span><br><span class="line"><span class="comment">//当一个goroutine获取写锁之后，其他的goroutine无论是获取读锁还是写锁都会等待</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">var</span> (</span><br><span class="line">	y      <span class="keyword">int64</span>        = <span class="number">0</span></span><br><span class="line">	rwLock sync.RWMutex <span class="comment">//读写锁</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">read</span><span class="params">()</span></span> &#123;</span><br><span class="line">	<span
