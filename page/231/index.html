line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;!DOCTYPE <span class="meta-keyword">html</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">html</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">&quot;demo&quot;</span>&gt;</span></span><br><span class="line">        <span class="comment">&lt;!--</span></span><br><span class="line"><span class="comment">            1.列表过滤</span></span><br><span class="line"><span class="comment">            2.列表排序</span></span><br><span class="line"><span class="comment">        --&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">&quot;text&quot;</span>&gt;</span></span><br><span class="line">            <span class="tag">&lt;<span class="name">input</span> <span class="attr">type</span>=<span class="string">&quot;text&quot;</span> <span class="attr">v-model</span>=<span class="string">&quot;searchName&quot;</span>&gt;</span></span><br><span class="line">            <span class="tag">&lt;<span class="name">ul</span>&gt;</span></span><br><span class="line">                <span class="tag">&lt;<span class="name">li</span> <span class="attr">v-for</span>=<span class="string">&quot;(p,index) in filterPersons&quot;</span> <span class="attr">:key</span>=<span class="string">&quot;index&quot;</span>&gt;</span></span><br><span class="line">                    &#123;&#123;index&#125;&#125;---&#123;&#123;p.name&#125;&#125;---&#123;&#123;p.age&#125;&#125;</span><br><span class="line">                <span class="tag">&lt;/<span class="name">li</span>&gt;</span></span><br><span class="line">            <span class="tag">&lt;/<span class="name">ul</span>&gt;</span></span><br><span class="line">            <span class="tag">&lt;<span class="name">button</span> @<span class="attr">click</span>=<span class="string">&quot;setOrderType(1)&quot;</span>&gt;</span>年龄升序<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">            <span class="tag">&lt;<span class="name">button</span> @<span class="attr">click</span>=<span class="string">&quot;setOrderType(2)&quot;</span>&gt;</span>年龄降序<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">            <span class="tag">&lt;<span class="name">button</span> @<span class="attr">click</span>=<span class="string">&quot;setOrderType(0)&quot;</span>&gt;</span>原本顺序<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span> <span class="attr">src</span>=<span class="string">&quot;https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">new</span> Vue(&#123;</span></span><br><span class="line"><span class="javascript">            el: <span class="string">&quot;#demo&quot;</span>,</span></span><br><span class="line">            data: &#123;</span><br><span class="line"><span class="javascript">                searchName: <span class="string">&#x27;&#x27;</span>,</span></span><br><span class="line"><span class="javascript">                orderType: <span class="number">0</span>, <span class="comment">//0代表原本顺序，1代表年龄升序，2代表年龄降序</span></span></span><br><span class="line">                persons: [&#123;</span><br><span class="line"><span class="javascript">                        name: <span class="string">&#x27;Tom&#x27;</span>,</span></span><br><span class="line">                        age: 18</span><br><span class="line">                    &#125;,</span><br><span class="line">                    &#123;</span><br><span class="line"><span class="javascript">                        name: <span class="string">&#x27;Jack&#x27;</span>,</span></span><br><span class="line">                        age: 19</span><br><span class="line">                    &#125;,</span><br><span class="line">                    &#123;</span><br><span class="line"><span class="javascript">                        name: <span class="string">&#x27;Bob&#x27;</span>,</span></span><br><span class="line">                        age: 13</span><br><span class="line">                    &#125;,</span><br><span class="line">                    &#123;</span><br><span class="line"><span class="javascript">                        name: <span class="string">&#x27;Rose&#x27;</span>,</span></span><br><span class="line">                        age: 22</span><br><span class="line">                    &#125;,</span><br><span class="line">                ]</span><br><span class="line">            &#125;,</span><br><span class="line"><span class="javascript">            <span class="comment">//因为 filterPersons 是通过 searchName 与 persons 来动态获得</span></span></span><br><span class="line"><span class="javascript">            <span class="comment">//  明显是计算属性</span></span></span><br><span class="line">            computed: &#123;</span><br><span class="line"><span class="javascript">                <span class="function"><span class="title">filterPersons</span>(<span class="params"></span>)</span> &#123;</span></span><br><span class="line"><span class="javascript">                    <span class="comment">//取出相关的数据</span></span></span><br><span class="line"><span class="javascript">                    <span class="keyword">const</span> &#123;</span></span><br><span class="line">                        searchName,</span><br><span class="line">                        persons,</span><br><span class="line">                        orderType</span><br><span class="line"><span class="javascript">                    &#125; = <span class="built_in">this</span>;</span></span><br><span class="line"><span class="javascript">                    <span class="keyword">let</span> finalPersons;</span></span><br><span class="line"><span class="javascript">                    <span class="comment">// 过滤</span></span></span><br><span class="line"><span class="javascript">                    <span class="comment">// filter 对数组的每一项进行遍历，return 为 false 则不在新数组中添加 </span></span></span><br><span class="line"><span class="javascript">                    <span class="comment">//  其返回新的数组</span></span></span><br><span class="line"><span class="javascript">                    <span class="comment">// indexOf 传入&#x27;&#x27;都不会为-1</span></span></span><br><span class="line"><span class="javascript">                    finalPersons = persons.filter(<span class="function"><span class="params">p</span> =&gt;</span> p.name.indexOf(searchName) !== -<span class="number">1</span>);</span></span><br><span class="line">                    if (orderType !== 0) &#123;</span><br><span class="line"><span class="javascript">                        <span class="comment">//sort 对于 a、b 两个参数，若 return 为 负数，则排序后 a 会出现在 b 的前面</span></span></span><br><span class="line"><span class="javascript">                        <span class="comment">// return a-b ; // 此为升序</span></span></span><br><span class="line"><span class="javascript">                        <span class="comment">// return b-a ; // 此为降序  //前升逆降</span></span></span><br><span class="line"><span class="javascript">                        finalPersons.sort(<span class="function"><span class="keyword">function</span> (<span class="params">p1, p2</span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">                            <span class="keyword">if</span> (orderType === <span class="number">2</span>) &#123; <span class="comment">//降序</span></span></span><br><span class="line"><span class="javascript">                                <span class="keyword">return</span> p2.age - p1.age</span></span><br><span class="line"><span class="javascript">                            &#125; <span class="keyword">else</span> &#123;</span></span><br><span class="line"><span class="javascript">                                <span class="keyword">return</span> p1.age - p2.age</span></span><br><span class="line">                            &#125;</span><br><span class="line">                        &#125;)</span><br><span class="line">                    &#125;</span><br><span class="line"><span class="javascript">                    <span class="keyword">return</span> finalPersons;</span></span><br><span class="line">                &#125;</span><br><span class="line">            &#125;,</span><br><span class="line">            methods: &#123;</span><br><span class="line"><span class="javascript">                <span class="function"><span class="title">setOrderType</span>(<span class="params">orderType</span>)</span> &#123;</span></span><br><span class="line"><span class="javascript">                    <span class="built_in">this</span>.orderType = orderType;</span></span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;)</span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
