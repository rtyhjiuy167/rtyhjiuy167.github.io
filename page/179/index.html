dule/redigo/redis&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">连接池</span></span><br><span class="line"><span class="comment">1.事先初始化一定数量的连接，放入到连接池</span></span><br><span class="line"><span class="comment">2.当Go需要操作Redis时，直接从Redis连接池取出连接即可</span></span><br><span class="line"><span class="comment">3、这样可以节省临时获取Redis连接的时间，从而提高效率</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//定义一个全局的pool</span></span><br><span class="line"><span class="keyword">var</span> pool *redis.Pool</span><br><span class="line"></span><br><span class="line"><span class="comment">//当启动程序时，就初始化连接池</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">init</span><span class="params">()</span></span> &#123;</span><br><span class="line">	pool = &amp;redis.Pool&#123;</span><br><span class="line">		MaxIdle:     <span class="number">8</span>,   <span class="comment">//最大空闲连接数 //只是空闲的有8个，不够可以涨</span></span><br><span class="line">		MaxActive:   <span class="number">0</span>,   <span class="comment">//表示和数据库的最大连接数，0表示无限制</span></span><br><span class="line">		IdleTimeout: <span class="number">100</span>, <span class="comment">//表示最大空闲时间,为使用超出100s，则回到空闲处</span></span><br><span class="line">		Dial: <span class="function"><span class="keyword">func</span><span class="params">()</span> <span class="params">(redis.Conn, error)</span></span> &#123; <span class="comment">//初始化连接的代码</span></span><br><span class="line">			<span class="keyword">return</span> redis.Dial(<span class="string">&quot;tcp&quot;</span>, <span class="string">&quot;localhost:6379&quot;</span>)</span><br><span class="line">		&#125;,</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	<span class="comment">//先从 pool 取出一个连接</span></span><br><span class="line">	conn := pool.Get()</span><br><span class="line">	<span class="keyword">defer</span> conn.Close() <span class="comment">//关闭后，返回空闲处</span></span><br><span class="line"></span><br><span class="line">	_, err := conn.Do(<span class="string">&quot;set&quot;</span>, <span class="string">&quot;name&quot;</span>, <span class="string">&quot;汤姆猫&quot;</span>)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;conn.Do err：&quot;</span>, err)</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	r, err := redis.String(conn.Do(<span class="string">&quot;get&quot;</span>, <span class="string">&quot;name&quot;</span>))</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;err&quot;</span>, err)</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	fmt.Println(r)</span><br><span class="line">	<span class="comment">//如果我们要从 pool 取出连接，一定要保证连接池是没有关闭</span></span><br><span class="line">	pool.Close()</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
