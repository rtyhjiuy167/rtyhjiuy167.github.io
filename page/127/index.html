          <figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;!DOCTYPE <span class="meta-keyword">html</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">html</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">meta</span> <span class="attr">charset</span>=<span class="string">&quot;UTF-8&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line">        /** </span><br><span class="line">         * slice()</span><br><span class="line">         *  可以用来从数组中提取指定元素</span><br><span class="line">         *  该方法不会改变原数组，而是将截取到的元素封装到新数组中返回</span><br><span class="line">         *  参数：</span><br><span class="line">         *      1.截取开始的位置索引，包含开始索引</span><br><span class="line">         *      2.截取结束的位置索引，不包含结束索引</span><br><span class="line">         *          第2个参数可以省略不写，此时会截取从开始索引后的所有元素</span><br><span class="line">         *      索引可以传递负值，表示最后，顺序依然是从前往后</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> arr = [<span class="string">&quot;孙悟空1&quot;</span>, <span class="string">&quot;猪八戒2&quot;</span>, <span class="string">&quot;沙和尚3&quot;</span>];</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr.slice(<span class="number">1</span>, <span class="number">2</span>));<span class="comment">//[&quot;猪八戒2&quot;]</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr.slice(<span class="number">1</span>)); <span class="comment">//[&quot;猪八戒2&quot;, &quot;沙和尚3&quot;]</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr.slice(-<span class="number">2</span>));<span class="comment">//[&quot;猪八戒2&quot;, &quot;沙和尚3&quot;]</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr.slice(-<span class="number">3</span>, -<span class="number">1</span>));<span class="comment">//[&quot;孙悟空1&quot;, &quot;猪八戒2&quot;]</span></span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * splice()</span><br><span class="line">         *  可以用来删除数组中的指定元素</span><br><span class="line">         *  该方法会改变原数组，并将删除的元素封装到新数组中返回</span><br><span class="line">         *  参数：</span><br><span class="line">         *      1.截取开始的位置索引，包含开始索引</span><br><span class="line">         *      2.表示删除的数量</span><br><span class="line">         *      3.第三个及以后 </span><br><span class="line">         *          可以传递一些新的元素，这些元素将会自动插入到 开始的位置索引 的前边</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> result1 = arr.splice(<span class="number">1</span>, <span class="number">1</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(result1);<span class="comment">//[&quot;猪八戒2&quot;]</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr);<span class="comment">//[&quot;孙悟空1&quot;, &quot;沙和尚3&quot;]</span></span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> result2 = arr.splice(<span class="number">0</span>, <span class="number">2</span>, <span class="string">&quot;白骨精&quot;</span>, <span class="string">&quot;蜘蛛精&quot;</span>, <span class="string">&quot;牛魔王&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(result2);<span class="comment">//[&quot;孙悟空1&quot;, &quot;沙和尚3&quot;]</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr);<span class="comment">//[&quot;白骨精&quot;, &quot;蜘蛛精&quot;, &quot;牛魔王&quot;]</span></span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * concat()可以连接两个或多个数组，并将新的数组返回</span><br><span class="line">         *  该方法不会影响原数组</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> conarr = result1.concat(result2);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(conarr);<span class="comment">//[&quot;猪八戒2&quot;, &quot;孙悟空1&quot;, &quot;沙和尚3&quot;]</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(conarr.concat(<span class="string">&quot;123&quot;</span>, <span class="string">&quot;234&quot;</span>, arr));<span class="comment">//[&quot;猪八戒2&quot;, &quot;孙悟空1&quot;, &quot;沙和尚3&quot;, &quot;123&quot;, &quot;234&quot;, &quot;白骨精&quot;, &quot;蜘蛛精&quot;, &quot;牛魔王&quot;]</span></span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * join()</span><br><span class="line">         *  该方法可以将数组转换为一个字符串</span><br><span class="line">         *  该方法不会对原数组产生影响，而是将转换后的字符串作为结果返回</span><br><span class="line">         *  在join()中,可以指定一个字符串作为参数，这个字符串将会成为数组中元素的连接符</span><br><span class="line">         *      如果不指定连接符，则默认使用 , 作为连接符</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> arr1 = [<span class="string">&quot;孙悟空1&quot;</span>, <span class="string">&quot;猪八戒2&quot;</span>, <span class="string">&quot;沙和尚3&quot;</span>];</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr1.join(<span class="string">&quot;@-@&quot;</span>));<span class="comment">//孙悟空1@-@猪八戒2@-@沙和尚3</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr1.join());<span class="comment">//孙悟空1,猪八戒2,沙和尚3</span></span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         *reverse()</span><br><span class="line">         *  该方法用来反转数组，对原数组有影响</span><br><span class="line">         */</span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr1.reverse());<span class="comment">//[&quot;沙和尚3&quot;, &quot;猪八戒2&quot;, &quot;孙悟空1&quot;]</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr1);<span class="comment">//[&quot;沙和尚3&quot;, &quot;猪八戒2&quot;, &quot;孙悟空1&quot;]</span></span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         *sort()</span><br><span class="line">         *  该方法用来对数组中的元素默认按照Unicode编码从小到大进行排序，对原数组有影响</span><br><span class="line">         *      </span><br><span class="line">         *  我们可以在sort()中添加一个回调函数，来指定排序规则</span><br><span class="line">         *      该回调函数需要定义两个参数</span><br><span class="line">         *      使用哪个元素调用不确定，</span><br><span class="line">         *          但是可以肯定地是在数组中前边的参数代表的元素一定比后边的参数代表的元素在数组前面</span><br><span class="line">         *  浏览器会根据回调函数的返回值来决定元素的顺序</span><br><span class="line">         *       如果返回一个大于0的值，则元素会交换位置</span><br><span class="line">         *       如果返回一个小0的值，则元素位置不变</span><br><span class="line">         *       如果返回一个0，则认为两个元素相等，元素位置也不变</span><br><span class="line">         */</span><br><span class="line">        arr2 = [2, 3, 5, 4, 6, 11];</span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(arr2.sort());<span class="comment">//[11, 2, 3, 4, 5, 6]</span></span></span><br><span class="line"><span class="javascript">        arr2.sort(<span class="function"><span class="keyword">function</span> (<span class="params">a, b</span>) </span>&#123; <span class="keyword">return</span> a - b; &#125;);<span class="comment">//升序排列 大会往后移</span></span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
