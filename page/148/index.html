    <div class="post-body" itemprop="articleBody">
          <figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;!DOCTYPE <span class="meta-keyword">html</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">html</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">meta</span> <span class="attr">charset</span>=<span class="string">&quot;UTF-8&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line">        /** </span><br><span class="line">         * 原型 prototype</span><br><span class="line">         * </span><br><span class="line">         *  我们所创建的每一个函数，解析器都会向函数中添加一个属性protoype</span><br><span class="line">         *      这个属性对应着一个对象，这个对象就是我们所谓的原型对象</span><br><span class="line">         *          如果函数作为普通函数调用，则prototype没有任何作用</span><br><span class="line">         *  当函数以构造函数的形式调用时，他所创建的对象中都会有一个隐含的属性，</span><br><span class="line">         *      指向该构造函数的原型对象</span><br><span class="line">         *      我们可以通过__proto__来访问该属性</span><br><span class="line">         * </span><br><span class="line">         * 原型对象就相当于一个公共的区域，所有同一个类的实例都可以访问到这个原型对象，</span><br><span class="line">         *  我们可以将对象中共有的内容，统一设置到原型对象中</span><br><span class="line">         * </span><br><span class="line">         * 当我们访问对象的一个属性或方法时，它会先在对象自身中寻找</span><br><span class="line">         *  如果有则直接使用，如果没有则在原型对象中查找</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">Person</span>(<span class="params"></span>) </span>&#123;</span></span><br><span class="line"></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">MyClass</span>(<span class="params"></span>) </span>&#123;</span></span><br><span class="line"></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(Person.prototype);<span class="comment">//Object</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(Person.prototype == MyClass.prototype);<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> mc1 = <span class="keyword">new</span> Person();</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> mc2 = <span class="keyword">new</span> Person();</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(mc1.__proto__);<span class="comment">//Object</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(mc1.__proto__ == Person.prototype);<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(mc2.__proto__ == Person.prototype);<span class="comment">//true</span></span></span><br><span class="line"></span><br><span class="line"><span class="javascript">        <span class="comment">//向Person的原型中添加一个属性</span></span></span><br><span class="line"><span class="javascript">        Person.prototype.name = <span class="string">&quot;我的名字&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="comment">//向Person的原型中添加一个方法</span></span></span><br><span class="line"><span class="javascript">        Person.prototype.sayHello = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">console</span>.log(<span class="string">&quot;Hello!&quot;</span>);</span></span><br><span class="line">        &#125;</span><br><span class="line">        mc1.sayHello();</span><br><span class="line"></span><br><span class="line">        /*</span><br><span class="line">        |------------|              |----------|             </span><br><span class="line">        |            |    ------&gt;   |          |    </span><br><span class="line">        |------------|          --&gt; |----------|</span><br><span class="line">                               /</span><br><span class="line">                              /</span><br><span class="line">        |------------|       /</span><br><span class="line">        |            |   ---/</span><br><span class="line">        |------------|</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="comment">//使用in检查对象中是否含有某个属性时，如果对象中没有但是原型中有，也会放回true，再没有则去原型的原型去找</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//可以使用对象的hasOwnProterty()来检查对象自身中是否含有该属性，而hasOwnProterty()是原型的原型里的</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="string">&quot;&#x27;name&#x27; in Person：&quot;</span> + (<span class="string">&quot;name&quot;</span> <span class="keyword">in</span> Person));<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="string">&quot;mc1.hasOwnProperty(&#x27;name&#x27;))：&quot;</span> + (mc1.hasOwnProperty(<span class="string">&#x27;name&#x27;</span>)));<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="string">&quot;mc1.hasOwnProperty(&#x27;hasOwnProperty&#x27;))：&quot;</span> + (mc1.hasOwnProperty(<span class="string">&#x27;hasOwnProperty&#x27;</span>)));<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(mc1.__proto__.hasOwnProperty(<span class="string">&#x27;hasOwnProperty&#x27;</span>));<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//因为原型对象也是对象，其也有原型</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="string">&quot;mc1.__proto__.__proto__.hasOwnProperty(&#x27;hasOwnProperty&#x27;)：&quot;</span> + (mc1.__proto__.__proto__.hasOwnProperty(<span class="string">&#x27;hasOwnProperty&#x27;</span>)));<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(mc1.__proto__.__proto__.__proto__);<span class="comment">//null  到头了（一般两层，Object的原型对象是没有原型的）</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="string">&#x27;sayHello&#x27;</span> <span class="keyword">in</span> Person);<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="string">&#x27;sayHello&#x27;</span> <span class="keyword">in</span> Person.prototype);<span class="comment">//true</span></span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
