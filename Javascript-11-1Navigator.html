        <figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;!DOCTYPE <span class="meta-keyword">html</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">html</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line">        /** </span><br><span class="line">         * DOM</span><br><span class="line">         *  -文档对象模型</span><br><span class="line">         *  -用来操作网页的</span><br><span class="line">         * </span><br><span class="line">         * BOM对象</span><br><span class="line">         *  -浏览器对象模型</span><br><span class="line">         *  -用来操作浏览器的</span><br><span class="line">         *  -BOM对象</span><br><span class="line">         *      Window</span><br><span class="line"><span class="javascript">         *          -代表的是整个浏览器的窗口，同时<span class="built_in">window</span>也是网页中的全局对象</span></span><br><span class="line">         *      Navigator</span><br><span class="line">         *          -代表当前浏览器的信息，通过该对象可以用来识别不同的浏览器</span><br><span class="line">         *      Location    </span><br><span class="line">         *          -代表当前浏览器的地址栏信息（网址），可通过Location获取地址栏信息</span><br><span class="line">         *          -或者操作浏览器跳转页面</span><br><span class="line">         *      History</span><br><span class="line">         *          -代表浏览器的历史记录，可以通过该对象来操作浏览器的历史记录</span><br><span class="line">         *           由于隐私原因，该对象不能获取到具体的历史记录，只能操作浏览器向前或向后翻页</span><br><span class="line">         *            而且该操作只在当次访问有效，关调页面后就失效</span><br><span class="line">         *      Screen</span><br><span class="line">         *          -代表用户的屏幕的信息</span><br><span class="line">         * </span><br><span class="line"><span class="javascript">         * 这些对象在浏览器中都是作为<span class="built_in">window</span>对象的属性保存的</span></span><br><span class="line"><span class="javascript">         *  可以通过<span class="built_in">window</span>对象来使用，也可直接使用</span></span><br><span class="line">        */</span><br><span class="line">        /** </span><br><span class="line">         * Navigator</span><br><span class="line">         *  -由于历史原因，Navigator对象中的大部分属性都已经不能帮助我们识别浏览器了</span><br><span class="line">         *  -一般我们只会使用userAgent来判断浏览器的信息</span><br><span class="line">         * </span><br><span class="line">         * 火狐：</span><br><span class="line">         * Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:89.0) Gecko/20100101 Firefox/89.0</span><br><span class="line">         *                                         浏览器版本 CSS引擎</span><br><span class="line">         * 在IE11（也叫ES）中已经不能用userAgent来判断了</span><br><span class="line">         * Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.101 Safari/537.36 Edg/91.0.864.48</span><br><span class="line">         * </span><br><span class="line">         * Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.61 Safari/537.36 115Browser/24.0.2.2</span><br><span class="line">        */</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * 如果通过UserAgent不能判断，还可以通过一些浏览器中持有的对象，来判断浏览器的信息</span><br><span class="line">         * 比如：ActictiveOX 为IE专有</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="built_in">window</span>.ActiveXObject);<span class="comment">//undefined  </span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(!<span class="built_in">window</span>.ActiveXObject);<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(!!<span class="built_in">window</span>.ActiveXObject);<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//在不是IE11及以下里，window.ActiveXObject是undefined ，竟还能判断，这其实是其做的手脚</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//可用in来解决此问题</span></span></span><br><span class="line"><span class="javascript">        alert(<span class="string">&quot;ActiveXObject&quot;</span> <span class="keyword">in</span> <span class="built_in">window</span>);</span></span><br><span class="line"></span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
