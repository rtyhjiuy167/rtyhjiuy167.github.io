ageState();</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">_MyPageState</span> <span class="keyword">extends</span> <span class="title">State</span>&lt;<span class="title">MyPage</span>&gt; <span class="title">with</span> <span class="title">SingleTickerProviderStateMixin</span> </span>&#123;</span><br><span class="line">  <span class="keyword">late</span> AnimationController _controller;</span><br><span class="line">  <span class="comment">//生成100个Snowflake() 放到_snowflakes里 等价于 for i = 0 ; i &lt; 100 ;i++</span></span><br><span class="line">  <span class="comment">//因为 Snowflake里的坐标是随机生成的 所以_snowflakes里的每一个是不一样的</span></span><br><span class="line">  <span class="built_in">List</span>&lt;Snowflake&gt; _snowflakes = <span class="built_in">List</span>.generate(<span class="number">100</span>, (_) =&gt; Snowflake());</span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  <span class="keyword">void</span> initState() &#123;</span><br><span class="line">    <span class="keyword">super</span>.initState();</span><br><span class="line">    _controller =</span><br><span class="line">        AnimationController(vsync: <span class="keyword">this</span>, duration: <span class="built_in">Duration</span>(seconds: <span class="number">2</span>))</span><br><span class="line">          ..repeat();</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  <span class="keyword">void</span> dispose() &#123;</span><br><span class="line">    <span class="keyword">super</span>.dispose();</span><br><span class="line">    _controller.dispose();</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  Widget build(BuildContext context) &#123;</span><br><span class="line">    <span class="keyword">return</span> Scaffold(</span><br><span class="line">      appBar: AppBar(),</span><br><span class="line">      body: Center(</span><br><span class="line">        child: Container(</span><br><span class="line">          constraints: BoxConstraints.expand(), <span class="comment">//等价于 宽和高为 double.infinity</span></span><br><span class="line">          decoration: BoxDecoration(</span><br><span class="line">            color: Colors.blue,</span><br><span class="line">            gradient: LinearGradient(</span><br><span class="line">              begin: Alignment.topCenter,</span><br><span class="line">              end: Alignment.bottomCenter,</span><br><span class="line">              colors: [Colors.blue, Colors.lightBlue, Colors.white],</span><br><span class="line">              stops: [<span class="number">0.0</span>, <span class="number">0.9</span>, <span class="number">1.0</span>],</span><br><span class="line">            ),</span><br><span class="line">          ),</span><br><span class="line">          <span class="comment">//用显示动画控件包裹 容易实现雪花循环落下</span></span><br><span class="line">          child: AnimatedBuilder(</span><br><span class="line">            animation: _controller,</span><br><span class="line">            builder: (_, __) &#123;</span><br><span class="line">              <span class="comment">//调用每个snowflakes 的 fall 函数 实现下落</span></span><br><span class="line">              _snowflakes.forEach(</span><br><span class="line">                (snow) &#123;</span><br><span class="line">                  snow.fall();</span><br><span class="line">                &#125;,</span><br><span class="line">              );</span><br><span class="line">              <span class="keyword">return</span> CustomPaint(</span><br><span class="line">                painter: MyPainter(_snowflakes),</span><br><span class="line">              );</span><br><span class="line">            &#125;,</span><br><span class="line">          ),</span><br><span class="line">        ),</span><br><span class="line">      ),</span><br><span class="line">    );</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">MyPainter</span> <span class="keyword">extends</span> <span class="title">CustomPainter</span> </span>&#123;</span><br><span class="line">  <span class="built_in">List</span>&lt;Snowflake&gt; _snowflakes;</span><br><span class="line">  MyPainter(<span class="keyword">this</span>._snowflakes);</span><br><span class="line">  <span class="keyword">final</span> _paint = Paint()..color = Colors.white;</span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  <span class="keyword">void</span> paint(Canvas canvas, Size size) &#123;</span><br><span class="line">    canvas.drawCircle(</span><br><span class="line">        size.center(Offset(<span class="number">0</span>, <span class="number">110</span>)), <span class="number">60</span>, _paint); <span class="comment">//画圆 在画布的中心往下100开始 半径为60 其它</span></span><br><span class="line">    canvas.drawOval(</span><br><span class="line">        Rect.fromCenter(</span><br><span class="line">            center: size.center(Offset(<span class="number">0</span>, <span class="number">280</span>)), width: <span class="number">200</span>, height: <span class="number">250</span>),</span><br><span class="line">        _paint); <span class="comment">// 画椭圆 椭圆由长方形而来？！</span></span><br><span class="line">    <span class="comment">//将_snowflakes 循环 对于里的每一项都要画上去</span></span><br><span class="line">    _snowflakes.forEach((snowflake) &#123;</span><br><span class="line">      canvas.drawCircle(</span><br><span class="line">          Offset(snowflake.x, snowflake.y), snowflake.radius, _paint);</span><br><span class="line">    &#125;);</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//该不该重画</span></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  <span class="comment">//oldDelegate 返回上一帧的CustomPainter 此时我们可以比较一些关键值，如果有变动就重画</span></span><br><span class="line">  <span class="built_in">bool</span> shouldRepaint(<span class="keyword">covariant</span> CustomPainter oldDelegate) =&gt;</span><br><span class="line">      <span class="keyword">true</span>; <span class="comment">//这里，我们每次都重画 true</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//Snowflake 雪花</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Snowflake</span> </span>&#123;</span><br><span class="line">  <span class="built_in">double</span> x = Random().nextDouble() * <span class="number">400</span>; <span class="comment">// 0~400 需要做适配</span></span><br><span class="line">  <span class="built_in">double</span> y = Random().nextDouble() * <span class="number">700</span>; <span class="comment">//需要做适配</span></span><br><span class="line"></span><br><span class="line">  <span class="built_in">double</span> radius = Random().nextDouble() * <span class="number">2</span> + <span class="number">4</span>; <span class="comment">//radius 半径 (0+2) ~ (2+2)</span></span><br><span class="line">  <span class="built_in">double</span> velocity = Random().nextDouble() * <span class="number">4</span> + <span class="number">2</span>; <span class="comment">// 速度 (0+2) ~ (4+2)</span></span><br><span class="line">  fall() &#123;</span><br><span class="line">    y += velocity;</span><br><span class="line">    <span class="keyword">if</span> (y &gt; <span class="number">700</span>) &#123;</span><br><span class="line">      x = Random().nextDouble() * <span class="number">400</span>;</span><br><span class="line">      y = <span class="number">0</span>;</span><br><span class="line">      radius = Random().nextDouble() * <span class="number">2</span> + <span class="number">4</span>;</span><br><span class="line">      velocity = Random().nextDouble() * <span class="number">4</span> + <span class="number">2</span>;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
