class="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> <span class="string">&#x27;package:flutter/material.dart&#x27;</span>;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">TextFieldAndFormDemo</span> <span class="keyword">extends</span> <span class="title">StatefulWidget</span> </span>&#123;</span><br><span class="line">  <span class="keyword">const</span> TextFieldAndFormDemo(&#123;Key? key&#125;) : <span class="keyword">super</span>(key: key);</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  _TextFieldAndFormDemoState createState() =&gt; _TextFieldAndFormDemoState();</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//表达要求：</span></span><br><span class="line"><span class="comment">//用户名不能为空，如果为空则提示“用户名不能为空”。</span></span><br><span class="line"><span class="comment">//密码不能小于6位，如果小于6为则提示“密码不能少于6位”</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//FormState为Form的State类，可以通过Form.of()或GlobalKey获得。我们可以通过它来对Form的子孙FormField进行统一操作</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//1.FormState.validate()：调用此方法后，会调用Form子孙FormField的validate回调，</span></span><br><span class="line"><span class="comment">// 如果有一个校验失败，则返回false，所有校验失败项都会返回用户返回的错误提示。</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//2.FormState.save()：调用此方法后，会调用Form子孙FormField的save回调，用于保存表单内容</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//3.FormState.reset()：调用此方法后，会将子孙FormField的内容清空</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//validator 接收的参数 value 在做操作时，需要判断是否为 null 返回值为 string 或者 null</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">_TextFieldAndFormDemoState</span> <span class="keyword">extends</span> <span class="title">State</span>&lt;<span class="title">TextFieldAndFormDemo</span>&gt; </span>&#123;</span><br><span class="line">  <span class="keyword">final</span> GlobalKey&lt;FormState&gt; _formKey = GlobalKey&lt;FormState&gt;();</span><br><span class="line">  TextEditingController _Controller1 = TextEditingController();</span><br><span class="line">  TextEditingController _Controller2 =</span><br><span class="line">      TextEditingController(text: <span class="string">&quot;hello world&quot;</span>);</span><br><span class="line">  FocusNode focusNode1 = <span class="keyword">new</span> FocusNode();</span><br><span class="line">  FocusNode focusNode2 = <span class="keyword">new</span> FocusNode();</span><br><span class="line">  <span class="keyword">late</span> FocusScopeNode focusScopeNode; <span class="comment">//未初始化的变量需加 late</span></span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  <span class="keyword">void</span> initState() &#123;</span><br><span class="line">    <span class="comment">// <span class="doctag">TODO:</span> implement initState</span></span><br><span class="line">    <span class="keyword">super</span>.initState();</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  <span class="keyword">void</span> dispose() &#123;</span><br><span class="line">    <span class="comment">// <span class="doctag">TODO:</span> implement dispose</span></span><br><span class="line">    <span class="comment">//对于已初始化的变量，退出时应释放掉，否则占用内存</span></span><br><span class="line">    <span class="keyword">super</span>.dispose();</span><br><span class="line">    _Controller1.dispose();</span><br><span class="line">    _Controller2.dispose();</span><br><span class="line">    focusNode1.dispose();</span><br><span class="line">    focusNode2.dispose();</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  Widget build(BuildContext context) &#123;</span><br><span class="line">    <span class="keyword">return</span> Form(</span><br><span class="line">        key: _formKey,</span><br><span class="line">        child: Column(</span><br><span class="line">          children: &lt;Widget&gt;[</span><br><span class="line">            TextFormField(</span><br><span class="line">              focusNode: focusNode1, <span class="comment">//关联focusNode1</span></span><br><span class="line">              controller: _Controller1, <span class="comment">//监听文本</span></span><br><span class="line">              maxLength: <span class="number">10</span>, <span class="comment">//输入框文本的最大长度</span></span><br><span class="line">              maxLines: <span class="number">1</span>, <span class="comment">//输入框的最大行数，默认为1</span></span><br><span class="line">              decoration: InputDecoration(</span><br><span class="line">                  labelText: <span class="string">&quot;用户名&quot;</span>, <span class="comment">//未取得焦点时的提示信息 取得焦点时移至左上方</span></span><br><span class="line">                  hintText: <span class="string">&quot;用户名或邮箱&quot;</span>, <span class="comment">//取得焦点时的提示信息</span></span><br><span class="line">                  prefixIcon: Icon(Icons.person) <span class="comment">//图标 可以用 icon 但不美观</span></span><br><span class="line">                  ),</span><br><span class="line">              onChanged: (v) &#123;</span><br><span class="line">                <span class="built_in">print</span>(_Controller1.text); <span class="comment">//_unameController.text 可以得到文本框的内容</span></span><br><span class="line">              &#125;,</span><br><span class="line">              validator: (<span class="built_in">String?</span> value) &#123;</span><br><span class="line">                <span class="comment">//验证 若没有输入则 Please enter some text</span></span><br><span class="line">                <span class="keyword">if</span> (value == <span class="keyword">null</span> || value.isEmpty) &#123;</span><br><span class="line">                  <span class="keyword">return</span> <span class="string">&#x27;Please enter some text&#x27;</span>; <span class="comment">//只要不为 null   _formKey.currentState!.validate()为 false</span></span><br><span class="line">                &#125;</span><br><span class="line">                <span class="keyword">return</span> <span class="keyword">null</span>; <span class="comment">//此时 _formKey.currentState!.validate()为 true</span></span><br><span class="line">              &#125;,</span><br><span class="line">              textInputAction:</span><br><span class="line">                  TextInputAction.next, <span class="comment">//键盘上点击确认后焦点会移至下一个 TextField</span></span><br><span class="line">            ),</span><br><span class="line">            TextFormField(</span><br><span class="line">              focusNode: focusNode2, <span class="comment">//该TextFormField 关联focusNode2</span></span><br><span class="line">              decoration: InputDecoration(</span><br><span class="line">                  labelText: <span class="string">&quot;密码&quot;</span>,</span><br><span class="line">                  hintText: <span class="string">&quot;您的登录密码&quot;</span>,</span><br><span class="line">                  prefixIcon: Icon(Icons.lock)),</span><br><span class="line">              obscureText: <span class="keyword">true</span>, <span class="comment">//输入隐藏</span></span><br><span class="line">              validator: (<span class="built_in">String?</span> value) &#123;</span><br><span class="line">                <span class="keyword">if</span> (value == <span class="keyword">null</span> || value.trim().length &lt;= <span class="number">5</span>) &#123;</span><br><span class="line">                  <span class="comment">//必须判断是否为 null 否则报错</span></span><br><span class="line">                  <span class="comment">//trim() 取除首尾空格</span></span><br><span class="line">                  <span class="keyword">return</span> <span class="string">&quot;密码不能少于6位&quot;</span>;</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="keyword">return</span> <span class="keyword">null</span>;</span><br><span class="line">              &#125;,</span><br><span class="line">            ),</span><br><span class="line">            ElevatedButton(</span><br><span class="line">                onPressed: () &#123;</span><br><span class="line">                  FocusScope.of(context).requestFocus(focusNode2); <span class="comment">//切换焦点zhi</span></span><br><span class="line">                &#125;,</span><br><span class="line">                child: Text(<span class="string">&quot;切换焦点&quot;</span>)),</span><br><span class="line">            Container(<span class="comment">//需在 From 里创建一个 Builder 才能得到</span></span><br><span class="line">                child: Builder(builder: (context) &#123;</span><br><span class="line">              <span class="keyword">return</span> ElevatedButton(</span><br><span class="line">                  onPressed: () &#123;</span><br><span class="line">                    <span class="keyword">if</span> (_formKey.currentState!.validate()) &#123;</span><br><span class="line">                      <span class="comment">// 将之前 retrun 的内容 显示在相应的文本框底</span></span><br><span class="line">                      <span class="comment">//之前 return 有内容 则为 false</span></span><br><span class="line">                      <span class="comment">// Process data.</span></span><br><span class="line">                    &#125;</span><br><span class="line">                    <span class="built_in">print</span>((_formKey.currentState <span class="keyword">as</span> FormState)</span><br><span class="line">                        .validate()); <span class="comment">//as 是强制转换的意思</span></span><br><span class="line">                    <span class="comment">//if 里的写法 与该句写法效果相同</span></span><br><span class="line"></span><br><span class="line">                    <span class="comment">// 当所有编辑框都失去焦点时键盘就会收起</span></span><br><span class="line">                    focusNode1.unfocus();</span><br><span class="line">                    focusNode2.unfocus();</span><br><span class="line">                    <span class="comment">//需在 From 里创建一个 Builder 才能得到</span></span><br><span class="line">                    <span class="built_in">print</span>(Form.of(context).toString());</span><br><span class="line">                  &#125;,</span><br><span class="line">                  child: Text(<span class="string">&#x27;Submit&#x27;</span>));</span><br><span class="line">            &#125;))</span><br><span class="line">          ],</span><br><span class="line">        ));</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
