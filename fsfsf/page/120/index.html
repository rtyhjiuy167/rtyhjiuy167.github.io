ss="line"><span class="javascript">        <span class="keyword">var</span> result1 = str1.search(<span class="regexp">/a[bef]c/</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(result1);<span class="comment">//6</span></span></span><br><span class="line">        /** </span><br><span class="line">         *  可以根据正则表达式从一个字符串中将返回条件的内容提取出来</span><br><span class="line">         *  默认情况下match只会找到第一个符合要求的内容，找到以后就停止搜索</span><br><span class="line">         *       可以设置正则表达式为全局模式，这样就会匹配到所有内容</span><br><span class="line">         *  match()会将匹配到的内容封装到一个数组中返回</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> result2 = str.match(<span class="regexp">/[A-z]/</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(result2);<span class="comment">//a</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="keyword">typeof</span> result2);<span class="comment">//object</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="built_in">Array</span>.isArray(result2));<span class="comment">//ture</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(str.match(<span class="regexp">/[A-z]/g</span>));<span class="comment">//[&quot;a&quot;, &quot;b&quot;, &quot;c&quot;, &quot;d&quot;, &quot;e&quot;, &quot;f&quot;, &quot;g&quot;, &quot;h&quot;, &quot;j&quot;, &quot;k&quot;]</span></span></span><br><span class="line">        /** </span><br><span class="line">         * replace()</span><br><span class="line">         *  可以将字符串中的指定内容替换为新的内容</span><br><span class="line">         *  参数：</span><br><span class="line">         *      1.被替换的内容，可以接收一个正则表达式作为参数</span><br><span class="line">         *      2.新的内容</span><br><span class="line">         *  默认只替换第一个</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">       <span class="keyword">var</span> result3 =str.replace(<span class="regexp">/[a-c]/g</span>,<span class="string">&#x27;&#x27;</span>);</span></span><br><span class="line"><span class="javascript">       <span class="built_in">console</span>.log(result3);<span class="comment">//1234d5e6f7g8h9j10k</span></span></span><br><span class="line">       </span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
