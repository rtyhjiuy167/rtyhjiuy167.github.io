n class="line">  _ListViewDemoState createState() =&gt; _ListViewDemoState();</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">_ListViewDemoState</span> <span class="keyword">extends</span> <span class="title">State</span>&lt;<span class="title">ListViewDemo</span>&gt; </span>&#123;</span><br><span class="line">  <span class="keyword">late</span> ScrollController _controller;</span><br><span class="line">  <span class="built_in">bool</span> isShow = <span class="keyword">false</span>;</span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  <span class="keyword">void</span> initState() &#123;</span><br><span class="line">    <span class="keyword">super</span>.initState();</span><br><span class="line">    _controller = ScrollController();</span><br><span class="line"></span><br><span class="line">    <span class="comment">//为_controller 监听事件</span></span><br><span class="line">    <span class="comment">//滚动条在一定区域内消失，在一定区域内存在</span></span><br><span class="line">    _controller.addListener(() &#123;</span><br><span class="line">      <span class="keyword">if</span> (_controller.offset &gt; <span class="number">10</span> &amp;&amp; isShow == <span class="keyword">false</span>) &#123;</span><br><span class="line">        setState(() &#123;</span><br><span class="line">          isShow = <span class="keyword">true</span>;</span><br><span class="line">        &#125;);</span><br><span class="line">      &#125; <span class="keyword">else</span> <span class="keyword">if</span> (_controller.offset &lt;= <span class="number">10</span> &amp;&amp; isShow == <span class="keyword">true</span>) &#123;</span><br><span class="line">        setState(() &#123;</span><br><span class="line">          isShow = <span class="keyword">false</span>;</span><br><span class="line">        &#125;);</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;);</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  <span class="keyword">void</span> dispose() &#123;</span><br><span class="line">    <span class="keyword">super</span>.dispose();</span><br><span class="line">    _controller.dispose();</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="meta">@override</span></span><br><span class="line">  Widget build(BuildContext context) &#123;</span><br><span class="line">    <span class="keyword">return</span> Scaffold(</span><br><span class="line">      appBar: AppBar(</span><br><span class="line">        title: Text(<span class="string">&quot;flutter&quot;</span>),</span><br><span class="line">        centerTitle: <span class="keyword">true</span>,</span><br><span class="line">      ),</span><br><span class="line">      body: Column(</span><br><span class="line">        children: [</span><br><span class="line">          Container(</span><br><span class="line">            child: Text(<span class="string">&quot;hello&quot;</span>),</span><br><span class="line">          ),</span><br><span class="line">          <span class="comment">//Expanded 默认沾满 Flex 的弹性布局的方向的所有空间（除了非弹性的）</span></span><br><span class="line">          Expanded(</span><br><span class="line">              child: Container(</span><br><span class="line">            height: <span class="number">200</span>,</span><br><span class="line">            <span class="comment">//将 可滑动组件限制其宽高即可与其它组件一起并列使用</span></span><br><span class="line">            color: Colors.blue[<span class="number">100</span>],</span><br><span class="line">            child: Scrollbar(</span><br><span class="line">                <span class="comment">//在可滚动组件外层包裹 Scrollbar 可实现并显示滚动条</span></span><br><span class="line">                <span class="comment">//没有设置 itemCount 是 Scrollbar 无法移动</span></span><br><span class="line">                <span class="comment">// ListView.builder 可以实现上下缓冲</span></span><br><span class="line">                child: ListView.builder(</span><br><span class="line">              <span class="comment">//拉到顶或底部时 能否再拉</span></span><br><span class="line">              <span class="comment">//  BouncingScrollPhysics(), //ios 默认的</span></span><br><span class="line">              <span class="comment">//  ClampingScrollPhysics(), //android 默认的</span></span><br><span class="line">              physics: ClampingScrollPhysics(),</span><br><span class="line">              <span class="comment">//ListView.builder 的主要参数 其它参数在其它的可滚动组件中也有</span></span><br><span class="line">              <span class="comment">// 参数一 itemBuilder 方法</span></span><br><span class="line">              <span class="comment">// 参数二 itemCount  有几个</span></span><br><span class="line">              <span class="comment">// 参数三  controller</span></span><br><span class="line">              itemBuilder: (BuildContext context, <span class="built_in">int</span> index) &#123;</span><br><span class="line">                <span class="keyword">return</span> index % <span class="number">2</span> == <span class="number">0</span></span><br><span class="line">                    ? Text(<span class="string">&quot;1234&quot;</span>)</span><br><span class="line">                    : Divider(</span><br><span class="line">                        color: Colors.blue,</span><br><span class="line">                      ); <span class="comment">//对于用构造函数来添加Divider 可以将 ListView.builder 换成 ListView.separated</span></span><br><span class="line">                <span class="comment">//它多了一个 separatorBuilder 参数 该参数是一个分割组件生成器</span></span><br><span class="line">              &#125;,</span><br><span class="line">              itemCount: <span class="number">30</span>, <span class="comment">// 不加则为无限个 最好加上，不然有很多时，拖动滚动条会很卡 因为其不知道待加载组件的宽或高</span></span><br><span class="line">              controller: _controller,</span><br><span class="line">              itemExtent: <span class="number">100.0</span>, <span class="comment">//强制children的“滚动方向上子组件的长度”为itemExtent的值</span></span><br><span class="line">              <span class="comment">//指定itemExtent比让子组件自己决定自身长度会更高效 无需频繁去计算列表高度</span></span><br><span class="line">              shrinkWrap: <span class="keyword">false</span>, <span class="comment">//该属性表示是否根据子组件的总长度来设置ListView的长度，默认值为false</span></span><br><span class="line">              <span class="comment">//默认情况下，ListView的会在滚动方向尽可能多的占用空间。当ListView在一个无边界(滚动方向上)的容器中时，shrinkWrap必须为true</span></span><br><span class="line">            )),</span><br><span class="line">          ))</span><br><span class="line">        ],</span><br><span class="line">      ),</span><br><span class="line">      floatingActionButton: isShow</span><br><span class="line">          ? FloatingActionButton(</span><br><span class="line">              onPressed: () &#123;</span><br><span class="line">                <span class="comment">// _controller.offset 是 滚动条当前的位置</span></span><br><span class="line">                <span class="comment">//_controller.animateTo 滚动条跳到</span></span><br><span class="line">                _controller.animateTo(<span class="number">0</span>, <span class="comment">//跳转的位置</span></span><br><span class="line">                    duration: <span class="built_in">Duration</span>(microseconds: <span class="number">500</span>), <span class="comment">//跳转的共计时间</span></span><br><span class="line">                    curve: Curves.easeInBack); <span class="comment">//跳转的动画</span></span><br><span class="line">              &#125;,</span><br><span class="line">              child: Icon(Icons.backup))</span><br><span class="line">          : <span class="keyword">null</span>,</span><br><span class="line">    );</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
