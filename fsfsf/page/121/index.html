line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;!DOCTYPE <span class="meta-keyword">html</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">html</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">meta</span> <span class="attr">charset</span>=<span class="string">&quot;UTF-8&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line">        /** </span><br><span class="line">         * 正则表达式</span><br><span class="line">         *  创建正则表达式对象</span><br><span class="line">         *      构造函数创建正则表达式对象</span><br><span class="line">         *         语法：</span><br><span class="line"><span class="javascript">         *          <span class="keyword">var</span> 变量 = <span class="keyword">new</span> <span class="built_in">RegExp</span>(<span class="string">&quot;正则表达式&quot;</span>,<span class="string">&quot;匹配模式&quot;</span>);</span></span><br><span class="line"><span class="javascript">         * 使用<span class="keyword">typeof</span>检查正则对象，会返回object </span></span><br><span class="line">         *      除了函数之外，其它的都为object</span><br><span class="line">         * </span><br><span class="line">         *  在构造函数中可以传递一个匹配模式作为第二个参数</span><br><span class="line">         *      i:忽略大小写</span><br><span class="line">         *      g:全局匹配模式</span><br><span class="line">         * </span><br><span class="line">         *  </span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> reg1 = <span class="keyword">new</span> <span class="built_in">RegExp</span>(<span class="string">&quot;ac&quot;</span>);<span class="comment">//该正则表达式可以检查字符串中是否含有ac</span></span></span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">fun</span>(<span class="params"></span>) </span>&#123; &#125;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="keyword">typeof</span> fun);<span class="comment">//function</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="keyword">typeof</span> reg1);<span class="comment">//object</span></span></span><br><span class="line">        /** </span><br><span class="line">         * 正则表达式的方法</span><br><span class="line">         *  text()</span><br><span class="line">         *      使用这个方法可以用来检查一个字符串是否符合正则表达式的规则</span><br><span class="line"><span class="javascript">         *          如果符合则会返回<span class="literal">true</span></span></span><br><span class="line">         * </span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str1 = <span class="string">&quot;abcdefg&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str2 = <span class="string">&quot;Abcdefg&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg1.test(str1));<span class="comment">//false  用reg里的去检查str的字符串</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg1.test(str2));</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> reg2 = <span class="keyword">new</span> <span class="built_in">RegExp</span>(<span class="string">&quot;Abc&quot;</span>, <span class="string">&quot;i&quot;</span>);<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg2.test(str1));<span class="comment">//true</span></span></span><br><span class="line">        /** </span><br><span class="line">         * 使用字面量创建正则表达式</span><br><span class="line">         *  语法:</span><br><span class="line"><span class="javascript">         *      <span class="keyword">var</span> 变量 = <span class="regexp">/正则表达式/</span>匹配模式</span></span><br><span class="line">         * 简单但不灵活，正则表达式不能用变量，写死了</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> reg3 = <span class="regexp">/Abc/i</span>;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg3.test(str1));<span class="comment">//true</span></span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * 创建一个正则表达式，检查一个字符串中是否有a或b或c  </span><br><span class="line">         *   或:|    []</span><br><span class="line">         * </span><br><span class="line">         * [a-z]任意的小写字母</span><br><span class="line">         * [A-Z]任意的大写字母</span><br><span class="line">         * [A-z]任意的字母</span><br><span class="line">         * [0-9]任意的数字</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        reg4 = <span class="regexp">/a|b|c/</span>;</span></span><br><span class="line"><span class="javascript">        reg5 = <span class="regexp">/[abc]/</span>;<span class="comment">//reg4与reg5相同 </span></span></span><br><span class="line"><span class="javascript">        reg6 = <span class="regexp">/[A-z]/</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str3 = <span class="string">&quot;a c e g&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str4 = <span class="string">&quot;e g&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str5 = <span class="string">&quot;abcs&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg4.test(str3));<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg4.test(str4));<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg5.test(str4));<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg4.test(str3));<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg6.test(str5));<span class="comment">//true</span></span></span><br><span class="line">        /** </span><br><span class="line">         * 创建一个正则表达式，检查一个字符串中是否有aaz或abz或acz</span><br><span class="line">         * </span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        reg7 = <span class="regexp">/a[abc]z/</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str6 = <span class="string">&quot;abz&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str7 = <span class="string">&quot;accz&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg7.test(str6));<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg7.test(str7));<span class="comment">//false</span></span></span><br><span class="line">        /** </span><br><span class="line">         * [^]表示除了</span><br><span class="line"><span class="javascript">         *      如果被检查的字符串中除了^后的字符串无其它字符串，则返回<span class="literal">false</span></span></span><br><span class="line">         *       检查的字符串是看顺序的</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        reg8 = <span class="regexp">/[^ab]/</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str8 = <span class="string">&quot;ababab&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str9 = <span class="string">&quot;abcabc&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str10 = <span class="string">&quot;abaabb&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg8.test(str8));<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg8.test(str9));<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(reg8.test(str10));<span class="comment">//false</span></span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
