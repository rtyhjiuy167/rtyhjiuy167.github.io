          <h5 id="服务端">服务端</h5>

<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;net&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	fmt.Println(<span class="string">&quot;服务器开始监听&quot;</span>)</span><br><span class="line">	<span class="comment">// tcp 表示使用网络协议的是 tcp</span></span><br><span class="line">	<span class="comment">// 127.0.0.1:8888 表示在本地监听端口 8888 端口  该写法只支持 Ipv4</span></span><br><span class="line">	<span class="comment">// 0.0.0.0:8888 该写法既支持 Ipv4，也支持 Ipv6</span></span><br><span class="line">	listen, err := net.Listen(<span class="string">&quot;tcp&quot;</span>, <span class="string">&quot;0.0.0.0:8888&quot;</span>)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;listen err:&quot;</span>, err)</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">defer</span> listen.Close() <span class="comment">//延时关闭</span></span><br><span class="line">	<span class="comment">//循环等待客户端连接</span></span><br><span class="line">	<span class="keyword">for</span> &#123;</span><br><span class="line">		<span class="comment">//等待客户端连接</span></span><br><span class="line">		fmt.Println(<span class="string">&quot;等待连接中...&quot;</span>)</span><br><span class="line">		<span class="comment">//Accept() 等待客户端连接</span></span><br><span class="line">		conn, err := listen.Accept()</span><br><span class="line">		<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">			fmt.Println(<span class="string">&quot;Accept() err：&quot;</span>, err)</span><br><span class="line">			<span class="comment">//不需要 return 因为只是一个客户端连接错，并不是所有的都错了</span></span><br><span class="line">		&#125; <span class="keyword">else</span> &#123;</span><br><span class="line">			<span class="comment">//RemoteAddr 是个接口 其里的String()可得到ip</span></span><br><span class="line">			fmt.Printf(<span class="string">&quot;Accept() suc conn =%v 客户端ip：%v\n&quot;</span>, conn, conn.RemoteAddr().String())</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="comment">//连接成功一个就为其开启一个协程，为客户端服务</span></span><br><span class="line">		<span class="keyword">go</span> process(conn)</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//协程</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">process</span><span class="params">(conn net.Conn)</span></span> &#123;</span><br><span class="line">	<span class="keyword">defer</span> conn.Close() <span class="comment">//关闭conn</span></span><br><span class="line">	<span class="comment">//这里我们循环的接收客户端发送的数据</span></span><br><span class="line">	<span class="keyword">for</span> &#123;</span><br><span class="line">		<span class="comment">//创建一个新的切片</span></span><br><span class="line">		buf := <span class="built_in">make</span>([]<span class="keyword">byte</span>, <span class="number">1024</span>)</span><br><span class="line">		<span class="comment">//等待客户端通过 conn 发送信息</span></span><br><span class="line">		fmt.Println(<span class="string">&quot;服务器在等待客户端 &quot;</span>, conn.RemoteAddr().String(), <span class="string">&quot;发送信息&quot;</span>)</span><br><span class="line">		<span class="comment">// 如果客户端没有 write ,那么协程就会阻塞在这</span></span><br><span class="line">		n, err := conn.Read(buf) <span class="comment">//从 conn 读取，并存到 buf切片中，并返回字节个数</span></span><br><span class="line">		<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">			fmt.Println(<span class="string">&quot;服务器的Read err：&quot;</span>, err)</span><br><span class="line">			<span class="keyword">return</span> <span class="comment">//连接的客户端在输入后退出，不 return 就死循环了</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="comment">//显示客户端发送的内容到服务器的终端</span></span><br><span class="line">		fmt.Println(<span class="string">&quot;服务端收到了客户端的信息：&quot;</span>, <span class="keyword">string</span>(buf[:n])) <span class="comment">// 将切片强制转换 :n 表示读到实际的数据个数 不然就会把 1024 全转了...</span></span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h5 id="客户端">客户端</h5>

<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;bufio&quot;</span></span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;net&quot;</span></span><br><span class="line">	<span class="string">&quot;os&quot;</span></span><br><span class="line">	<span class="string">&quot;strings&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	conn, err := net.Dial(<span class="string">&quot;tcp&quot;</span>, <span class="string">&quot;127.0.0.1:8888&quot;</span>)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;client dial err:&quot;</span>, err)</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	fmt.Println(<span class="string">&quot;连到了&quot;</span>, conn)</span><br><span class="line"></span><br><span class="line">	<span class="comment">//功能一： 客户端可以发送单行数据，然后退出</span></span><br><span class="line"></span><br><span class="line">	reader := bufio.NewReader(os.Stdin) <span class="comment">//os.Stdin 代表标准输入[终端]</span></span><br><span class="line"></span><br><span class="line">	<span class="keyword">for</span> &#123;</span><br><span class="line"></span><br><span class="line">		<span class="comment">//从终端读取一行用户的输入，并准备发送给服务器</span></span><br><span class="line"></span><br><span class="line">		line, err := reader.ReadString(<span class="string">&#x27;\n&#x27;</span>)</span><br><span class="line">		<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">			fmt.Println(<span class="string">&quot;readString err:&quot;</span>, err)</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="comment">//如果用户输入的是 exit 就退出 小心换行符与空格</span></span><br><span class="line">		line = strings.Trim(line, <span class="string">&quot; \r\n&quot;</span>) <span class="comment">//将头尾的空格与换行符去掉</span></span><br><span class="line">		<span class="keyword">if</span> line == <span class="string">&quot;exit&quot;</span> &#123;</span><br><span class="line">			fmt.Println(<span class="string">&quot;客户端退出了&quot;</span>)</span><br><span class="line">			<span class="keyword">break</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="comment">//将 line 发送给服务器</span></span><br><span class="line">		_, err = conn.Write([]<span class="keyword">byte</span>(line)) <span class="comment">//将 line 强制转换</span></span><br><span class="line">		<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">			fmt.Println(<span class="string">&quot;conn.Write err:&quot;</span>, err)</span><br><span class="line">			<span class="comment">//不需要 return 因为可能由于各种原因丢失</span></span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
