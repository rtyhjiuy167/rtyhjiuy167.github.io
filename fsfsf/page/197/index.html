e">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Printf(<span class="string">&quot;open file err=%v\n&quot;</span>, err)</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">//待追加的字符串</span></span><br><span class="line">	str := <span class="string">&quot;hello World!\r\n&quot;</span> <span class="comment">//有些编辑器认 \r 为换行符</span></span><br><span class="line">	<span class="comment">//写入时，使用带缓存的 func bufio.NewWriter(w io.Writer) *bufio.Writer</span></span><br><span class="line">	writer := bufio.NewWriter(file)</span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="number">5</span>; i++ &#123;</span><br><span class="line">		writer.WriteString(str)</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">//因为 writer 是带缓存的，所以在调用 WriteString 时，是先写入其结构体里的 buf []byte中的</span></span><br><span class="line">	<span class="comment">//所以我们需要调用 Flush 将缓存的数据真正写入到文件中</span></span><br><span class="line">	writer.Flush()</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
