line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;!DOCTYPE <span class="meta-keyword">html</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">html</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span></span><br><span class="line">        * &#123;</span><br><span class="line"><span class="css">            <span class="attribute">margin</span>: <span class="number">0px</span>;</span></span><br><span class="line"><span class="css">            <span class="attribute">padding</span>: <span class="number">0px</span>;</span></span><br><span class="line">        &#125;</span><br><span class="line">    <span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">window</span>.onload = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            <span class="keyword">var</span> btn01 = <span class="built_in">document</span>.getElementById(<span class="string">&quot;btn01&quot;</span>);</span></span><br><span class="line"><span class="javascript">            btn01.onclick = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line">                alert(1);</span><br><span class="line">            &#125;;</span><br><span class="line"><span class="javascript">            btn01.onclick = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line">                alert(2);</span><br><span class="line">            &#125;;</span><br><span class="line"><span class="javascript">            <span class="comment">//结果，点击时只会触发后一个。</span></span></span><br><span class="line"><span class="javascript">            <span class="comment">// 因为这样的绑定方式会造成后边的覆盖掉前边的</span></span></span><br><span class="line"></span><br><span class="line">            /** </span><br><span class="line">             * addEventListener()</span><br><span class="line">             *  通过这个方法可以为元素绑定响应函数</span><br><span class="line">             *  参数:</span><br><span class="line">             *      1.事件的字符串，不要on  </span><br><span class="line">             *      2.回调函数，当事件触发时该函数会被调用</span><br><span class="line"><span class="javascript">             *      <span class="number">3.</span>是否在捕获阶段触发事件，需要一个布尔值，一般都传<span class="literal">false</span></span></span><br><span class="line">             * 使用addEventListener()可以同时为一个元素的相同事件（其事件也是对象的一个属性）</span><br><span class="line">             *      同时绑定多个响应函数</span><br><span class="line">             *      这样，当事件触发时，响应函数将会按照函数的绑定顺序执行</span><br><span class="line">             * IE8及以下不支持 attachEvent</span><br><span class="line">            */</span><br><span class="line"><span class="javascript">            <span class="keyword">var</span> btn02 = <span class="built_in">document</span>.getElementById(<span class="string">&quot;btn02&quot;</span>);</span></span><br><span class="line"><span class="javascript">            btn02.addEventListener(<span class="string">&quot;click&quot;</span>, <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123; alert(<span class="number">1</span>); &#125;, <span class="literal">false</span>);</span></span><br><span class="line"><span class="javascript">            btn02.addEventListener(<span class="string">&quot;click&quot;</span>, <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123; alert(<span class="number">2</span>); &#125;, <span class="literal">false</span>);</span></span><br><span class="line"></span><br><span class="line">            /** </span><br><span class="line">             * attachEvent IE独有 但IE11不支持</span><br><span class="line">             *  参数</span><br><span class="line">             *      1.事件的字符串，需要要on</span><br><span class="line">             *      2.回调函数</span><br><span class="line">             *  其调用顺序是，谁后绑定先调用谁</span><br><span class="line"><span class="javascript">             * addEventListener()中的<span class="built_in">this</span>，时绑定的事件的对象</span></span><br><span class="line"><span class="javascript">             * attachEvent()中的<span class="built_in">this</span>,是<span class="built_in">window</span></span></span><br><span class="line">            */</span><br><span class="line"><span class="javascript">            bind(btn02, <span class="string">&quot;click&quot;</span>, <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123; alert(<span class="number">3</span>); &#125;);</span></span><br><span class="line"><span class="javascript">            <span class="comment">//绑定兼容 this兼容</span></span></span><br><span class="line"><span class="javascript">            <span class="function"><span class="keyword">function</span> <span class="title">bind</span>(<span class="params">obj, eventStr, callback</span>) </span>&#123;</span></span><br><span class="line">                if (obj.addEventListener) &#123;</span><br><span class="line"><span class="javascript">                    <span class="comment">//绝大多少浏览器</span></span></span><br><span class="line"><span class="javascript">                    obj.addEventListener(eventStr, callback, <span class="literal">false</span>);</span></span><br><span class="line"><span class="javascript">                    <span class="comment">//注意：此处的callback是浏览器调用的</span></span></span><br><span class="line"><span class="javascript">                &#125; <span class="keyword">else</span> &#123;</span></span><br><span class="line"><span class="javascript">                    <span class="comment">//IE8及以下</span></span></span><br><span class="line"><span class="javascript">                    <span class="comment">//调整this的值，让其指向绑定的对象</span></span></span><br><span class="line"><span class="javascript">                    <span class="comment">//因为回调函数是浏览器自己执行的，</span></span></span><br><span class="line"><span class="javascript">                    <span class="comment">//  所以，可在用匿名函数作回调函数，</span></span></span><br><span class="line"><span class="javascript">                    <span class="comment">//      在匿名函数里自己调用callback</span></span></span><br><span class="line"><span class="javascript">                    obj.attachEvent(<span class="string">&quot;on&quot;</span> + eventStr, <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line">                        callback.call(obj);</span><br><span class="line"><span class="javascript">                        <span class="comment">//注意：此处的callback是我们自己调用的</span></span></span><br><span class="line"><span class="javascript">                        <span class="comment">//  使用call(obj),改变this的值</span></span></span><br><span class="line">                    &#125;)</span><br><span class="line">                &#125;;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">button</span> <span class="attr">id</span>=<span class="string">&quot;btn01&quot;</span>&gt;</span>btn01:点我一下<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">button</span> <span class="attr">id</span>=<span class="string">&quot;btn02&quot;</span>&gt;</span>btn02:点我一下<span class="tag">&lt;/<span class="name">button</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
