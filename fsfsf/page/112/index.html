r><span class="line"></span><br><span class="line"><span class="javascript">        <span class="comment">//document.createTextNode()创建文本节点</span></span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> bjTxet = <span class="built_in">document</span>.createTextNode(<span class="string">&quot;北京&quot;</span>);</span></span><br><span class="line"></span><br><span class="line"><span class="javascript">        <span class="comment">//appendChild() 把新的子节点添加到指定节点</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">document</span>.body.appendChild(bjTxet);</span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * insertBefore()</span><br><span class="line">         * 可以在指定的子节点前插入新的子节点</span><br><span class="line">         *  语法：</span><br><span class="line">         *      父节点.insertBefore(新节点，旧节点)</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> capTxet = <span class="built_in">document</span>.createTextNode(<span class="string">&quot;首都&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">document</span>.body.insertBefore(capTxet, bjTxet);</span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * insertBefore()</span><br><span class="line">         * 可以在指定的子节点前插入新的子节点</span><br><span class="line">         *  语法：</span><br><span class="line">         *      父节点.insertBefore(新节点，旧节点)</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> cityTxet = <span class="built_in">document</span>.createTextNode(<span class="string">&quot;城市&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">document</span>.body.replaceChild(cityTxet, bjTxet);</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * removeChild()</span><br><span class="line">         * 可以删除一个子节点</span><br><span class="line">         *  语法：</span><br><span class="line">         *      父节点.removeChild(子节点)</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        cityTxet.parentNode.removeChild(cityTxet);<span class="comment">//删除自己</span></span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="javascript">        <span class="comment">//使用innerHTML也可以增加，但会重新把其原先的所有子元素重新添加</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">// 如果已经绑定了事件，这会造成之前的操作无效</span></span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> ul = <span class="built_in">document</span>.getElementById(<span class="string">&quot;ul&quot;</span>);</span></span><br><span class="line"><span class="handlebars"><span class="xml">        ul.innerHTML += &quot;<span class="tag">&lt;<span class="name">li</span>&gt;</span>3<span class="tag">&lt;/<span class="name">li</span>&gt;</span>&quot;;</span></span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * 一般情况下，元素添加采取如下3步</span><br><span class="line">         *  其只影响自己</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> newNode = <span class="built_in">document</span>.createElement(<span class="string">&quot;li&quot;</span>);</span></span><br><span class="line"><span class="javascript">        newNode.innerHTML = <span class="string">&quot;NewNode&quot;</span>;</span></span><br><span class="line">        ul.appendChild(newNode);</span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
