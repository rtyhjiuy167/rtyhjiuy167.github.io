">61</span><br><span class="line">62</span><br><span class="line">63</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;encoding/json&quot;</span></span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment">//结构体字段的可见性与JSON序列化</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//Go语言中，如果一个包中定义的标识符的首字母是大写的，那么就是对外可见的</span></span><br><span class="line"><span class="keyword">type</span> Student <span class="keyword">struct</span> &#123; <span class="comment">//Student 是大写的 所以可见</span></span><br><span class="line">	ID   <span class="keyword">int</span>    <span class="comment">//ID 大写，可见</span></span><br><span class="line">	Name <span class="keyword">string</span> <span class="comment">//若Name为name，则在下方的代码执行时，终端中没有 name  //因为 在json这个包是访问不到它的</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> class <span class="keyword">struct</span> &#123;</span><br><span class="line">	Title    <span class="keyword">string</span>    <span class="string">`json:&quot;title&quot; db:&quot;student&quot;`</span> <span class="comment">//使用 结构体标签 在JOSN序列化后使用的名 在数据库中使用的名</span></span><br><span class="line">	Students []Student <span class="comment">//切片</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">newStudent</span><span class="params">(id <span class="keyword">int</span>, name <span class="keyword">string</span>)</span> <span class="title">Student</span></span> &#123;</span><br><span class="line">	<span class="keyword">return</span> Student&#123;</span><br><span class="line">		ID:   id,</span><br><span class="line">		Name: name,</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	c1 := class&#123;</span><br><span class="line">		Title:    <span class="string">&quot;1班&quot;</span>,</span><br><span class="line">		Students: <span class="built_in">make</span>([]Student, <span class="number">0</span>, <span class="number">20</span>),</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">//往班级里添加学生</span></span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; <span class="number">10</span>; i++ &#123;</span><br><span class="line">		tempStu := newStudent(i, fmt.Sprintf(<span class="string">&quot;stu%02d&quot;</span>, i))</span><br><span class="line">		c1.Students = <span class="built_in">append</span>(c1.Students, tempStu)</span><br><span class="line">	&#125;</span><br><span class="line">	fmt.Printf(<span class="string">&quot;%#v\n&quot;</span>, c1)</span><br><span class="line">	<span class="comment">//Printf 用传入的格式化规则符将传入的变量写入到标准输出里面(即在终端中有显示)</span></span><br><span class="line">	<span class="comment">// 返回值为 写入标准输出的字节数和写入过程中遇到的问题</span></span><br><span class="line">	<span class="comment">//Sprintf 用传入的格式化规则符将传入的变量格式化，(终端中不会有显示)</span></span><br><span class="line">	<span class="comment">//返回为 格式化后的字符串 即双引号里的内容</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//JSON序列化：GO语言的数据-&gt;JSON格式的字符串</span></span><br><span class="line">	data, err := json.Marshal(c1)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;json marshal failed&quot;</span>)</span><br><span class="line">		<span class="keyword">return</span> <span class="comment">//不加,则data为二进制数据</span></span><br><span class="line">	&#125;</span><br><span class="line">	fmt.Printf(<span class="string">&quot;%T\n&quot;</span>, data)</span><br><span class="line">	fmt.Printf(<span class="string">&quot;%s\n&quot;</span>, data)</span><br><span class="line"></span><br><span class="line">	<span class="comment">//JSON反序列化</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//注意：是反引号</span></span><br><span class="line">	jsonStr := <span class="string">`&#123;&quot;Title&quot;:&quot;1班&quot;,&quot;Students&quot;:[&#123;&quot;ID&quot;:0,&quot;Name&quot;:&quot;stu00&quot;&#125;,&#123;&quot;ID&quot;:1,&quot;Name&quot;:&quot;stu01&quot;&#125;,&#123;&quot;ID&quot;:2,&quot;Name&quot;:&quot;stu02&quot;&#125;,&#123;&quot;ID&quot;:3,&quot;Name&quot;:&quot;stu03&quot;&#125;,&#123;&quot;ID&quot;:4,&quot;Name&quot;:&quot;stu04&quot;&#125;,&#123;&quot;ID&quot;:5,&quot;Name&quot;:&quot;stu05&quot;&#125;,&#123;&quot;ID&quot;:6,&quot;Name&quot;:&quot;stu06&quot;&#125;,&#123;&quot;ID&quot;:7,&quot;Name&quot;:&quot;stu07&quot;&#125;,&#123;&quot;ID&quot;:8,&quot;Name&quot;:&quot;stu08&quot;&#125;,&#123;&quot;ID&quot;:9,&quot;Name&quot;:&quot;stu09&quot;&#125;]&#125;`</span></span><br><span class="line">	<span class="keyword">var</span> c2 class                               <span class="comment">//class是在上面声明了的结构体</span></span><br><span class="line">	err = json.Unmarshal([]<span class="keyword">byte</span>(jsonStr), &amp;c2) <span class="comment">//修改结构体，需传入指针  因为Unmarshal第一个参数要求为字节类型，所以调用 []byte()</span></span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(<span class="string">&quot;json unmarshal failed&quot;</span>)</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span
