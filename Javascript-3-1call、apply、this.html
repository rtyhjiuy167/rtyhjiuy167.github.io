        <figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;!DOCTYPE <span class="meta-keyword">html</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">html</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">meta</span> <span class="attr">charset</span>=<span class="string">&quot;UTF-8&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line">        /** </span><br><span class="line">         * call()和apply()</span><br><span class="line">         *  这两个方法都是函数对象的方法，需要通过函数对象来调用</span><br><span class="line">         *  当对函数调用call()和apply()都会调用函数执行</span><br><span class="line">         *  在调用call()和apply()可以将一个对象指定为第一个参数</span><br><span class="line"><span class="javascript">         *      此时这个对象将会成为函数执行的<span class="built_in">this</span></span></span><br><span class="line">         * call()方法可以将实参在对像后依次传递</span><br><span class="line">         * apply()方法需要将实参封装到一个数组中统一传递</span><br><span class="line">         * </span><br><span class="line"><span class="javascript">         *  <span class="built_in">this</span>的情况</span></span><br><span class="line"><span class="javascript">         *      以函数的形式调用时，<span class="built_in">this</span>永远都是<span class="built_in">window</span></span></span><br><span class="line"><span class="javascript">         *      以方法的形式调用时，<span class="built_in">this</span>是调用方法的对象</span></span><br><span class="line"><span class="javascript">         *      以构造函数的形式调用时，<span class="built_in">this</span>是新创建的那个对象</span></span><br><span class="line"><span class="javascript">         *      使用call和apply调用时，<span class="built_in">this</span>是指定的那个对象</span></span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">fun</span>(<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">console</span>.log(<span class="string">&quot;hello &quot;</span> + <span class="built_in">this</span>);</span></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        fun.call();<span class="comment">//hello [object Window]</span></span></span><br><span class="line"><span class="javascript">        fun.apply();<span class="comment">//hello [object Window]</span></span></span><br><span class="line"><span class="javascript">        fun();<span class="comment">//hello [object Window]</span></span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> obj = &#123;&#125;;</span></span><br><span class="line"><span class="javascript">        fun.call(obj);<span class="comment">//hello [object Object]</span></span></span><br><span class="line"><span class="javascript">        fun.apply(obj);<span class="comment">//hello [object Object]</span></span></span><br><span class="line"><span class="javascript">        fun(obj);<span class="comment">//hello [object Window]</span></span></span><br><span class="line"></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> obj1 = &#123;</span></span><br><span class="line"><span class="javascript">            name: <span class="string">&quot;obj1&quot;</span></span></span><br><span class="line">        &#125;;</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> obj2 = &#123;</span></span><br><span class="line"><span class="javascript">            name: <span class="string">&quot;obj2&quot;</span>,</span></span><br><span class="line"><span class="javascript">            sayName: <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">                <span class="built_in">console</span>.log(<span class="built_in">this</span>.name);</span></span><br><span class="line">            &#125;</span><br><span class="line">        &#125;;</span><br><span class="line"><span class="javascript">        obj2.sayName();<span class="comment">//obj2</span></span></span><br><span class="line"><span class="javascript">        obj2.sayName(obj1);<span class="comment">//obj2</span></span></span><br><span class="line"><span class="javascript">        obj2.sayName.apply(obj1);<span class="comment">//obj1</span></span></span><br><span class="line"><span class="javascript">        obj2.sayName.call(obj1);<span class="comment">//obj1</span></span></span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">fun</span>(<span class="params">a, b</span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">console</span>.log(<span class="string">&quot;a :&quot;</span> + a + <span class="string">&quot; b :&quot;</span> + b);</span></span><br><span class="line">        &#125;</span><br><span class="line">        fun.call(obj, 2, 3);</span><br><span class="line">        fun.apply(obj, [2, 3]);</span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
