    <div class="post-body" itemprop="articleBody">
        <figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> <span class="string">&quot;fmt&quot;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//进制</span></span><br><span class="line"><span class="comment">// 二进制：0,1，满2进1</span></span><br><span class="line"><span class="comment">// 十进制：0~9，满10进1</span></span><br><span class="line"><span class="comment">// 八进制：0~7 满8进1，以数字0开头</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">十六进制：0~9及A~F，满16进1，以0x或0X开头表示，且A~F不区分大小写</span></span><br><span class="line"><span class="comment">	A表示10，B表示11，C表示12，D表示13，E表示14，F表示15</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line"></span><br><span class="line">	<span class="comment">//八进制</span></span><br><span class="line">	<span class="keyword">var</span> j <span class="keyword">int</span> = <span class="number">021</span>      <span class="comment">// 8^0*1 + 8^1*2 = 17</span></span><br><span class="line">	fmt.Println(<span class="string">&quot;j=&quot;</span>, j) <span class="comment">//输出为十进制 17</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//十六进制</span></span><br><span class="line">	<span class="keyword">var</span> k <span class="keyword">int</span> = <span class="number">0x34A</span>    <span class="comment">// 16^0*10 + 16^1*4 + 16^2*3 = 842</span></span><br><span class="line">	fmt.Println(<span class="string">&quot;k=&quot;</span>, k) <span class="comment">//输出为十进制 842</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//十进制转二进制</span></span><br><span class="line">	<span class="comment">//将该数不断除以2，直到商为0，然后将每步得到的余数倒过来，就是对应的二进制</span></span><br><span class="line">	<span class="comment">/*</span></span><br><span class="line"><span class="comment">	 56 / 2 = 28···0</span></span><br><span class="line"><span class="comment">	 28 / 2 = 14···0</span></span><br><span class="line"><span class="comment">	 14 / 2 = 7 ···0</span></span><br><span class="line"><span class="comment">	  7 / 2 = 3 ···1</span></span><br><span class="line"><span class="comment">	  3 / 2 = 1 ···1</span></span><br><span class="line"><span class="comment">	  1 / 2 = 0 ···1</span></span><br><span class="line"><span class="comment">	  结果即为 11000</span></span><br><span class="line"><span class="comment">	*/</span></span><br><span class="line">	<span class="keyword">var</span> i <span class="keyword">int</span> = <span class="number">56</span></span><br><span class="line">	<span class="comment">//二进制输出  %b</span></span><br><span class="line">	fmt.Printf(<span class="string">&quot;%b\n&quot;</span>, i) <span class="comment">//111000</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//十进制转八进制</span></span><br><span class="line">	<span class="comment">//将该数不断除以8，直到商为0，然后将每步得到的余数倒过来，就是对应的八进制</span></span><br><span class="line">	i = <span class="number">156</span></span><br><span class="line">	<span class="comment">/*</span></span><br><span class="line"><span class="comment">		 156 / 8 = 19···4</span></span><br><span class="line"><span class="comment">		  19 / 8 = 2 ···3</span></span><br><span class="line"><span class="comment">		   2 / 8 = 0 ···2</span></span><br><span class="line"><span class="comment">		结果即为 234</span></span><br><span class="line"><span class="comment">	*/</span></span><br><span class="line">	<span class="comment">//八进制输出  %o</span></span><br><span class="line">	fmt.Printf(<span class="string">&quot;%o\n&quot;</span>, i) <span class="comment">//234</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">//十进制转十六进制</span></span><br><span class="line">	<span class="comment">//将该数不断除以16，直到商为0，然后将每步得到的余数倒过来，就是对应的十六进制</span></span><br><span class="line">	i = <span class="number">3564</span></span><br><span class="line">	<span class="comment">/*</span></span><br><span class="line"><span class="comment">		 3564 / 16 = 222···12</span></span><br><span class="line"><span class="comment">		  222 / 16 = 13 ···14</span></span><br><span class="line"><span class="comment">		   13 / 16 = 0 ···13</span></span><br><span class="line"><span class="comment">		结果即为 13 14 12 --&gt; dec</span></span><br><span class="line"><span class="comment">	*/</span></span><br><span class="line">	<span class="comment">//八进制输出  %x</span></span><br><span class="line">	fmt.Printf(<span class="string">&quot;%x\n&quot;</span>, i) <span class="comment">//dec</span></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h4>二进制转八进制与十六进制</h4>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><span class="line">二进制转成八进制</span><br><span class="line">将二进制每三位一组（从第一位（个位？！）开始组合），转成对应的八进制数即可</span><br><span class="line">例如：11010101</span><br><span class="line">    11                 010                    101</span><br><span class="line">2^0*1+2^1*1      2^0*0+2^1*1+2^2*0     2^0*1+2^1*0+2^2*1</span><br><span class="line">     3                  2                      5</span><br><span class="line">结果即为 0325</span><br><span class="line"></span><br><span class="line">二进制转成十六进制</span><br><span class="line">将二进制每四位一组（从第一位（个位？！）开始组合），转成对应的十六进制数即可</span><br><span class="line">例如：11010101</span><br><span class="line">        1101                         0101</span><br><span class="line">2^0*1+2^1*0+2^2*1+2^3*1     2^0*1+2^1*0+2^2*1+2^3*0</span><br><span class="line">	     13                           5</span><br><span class="line">          D                           5</span><br><span class="line">结果即为 0xD5</span><br></pre></td></tr></table></figure>

<h4>八进制与十六进制转二进制</h4>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">八进制转二进制</span><br><span class="line">将八进制数的每一位，转成对应的一个3位的二进制数即可，最后一个能用一位就用一位，不行就二位，再不行就三位</span><br><span class="line">例如： 0237  &#x2F;&#x2F;0是八进制开头用的</span><br><span class="line"> 2   3   7</span><br><span class="line">10  011 111</span><br><span class="line">结果即为 10011111</span><br><span class="line"></span><br><span class="line">十六进制转二进制</span><br><span class="line">将十六进制数的每一位，转成对应的一个4位的二进制数即可，最后一个能用一位就用一位，不行就二位，再不行就三位，还不行就四位</span><br><span class="line">例如： 0x237  &#x2F;&#x2F;0x是十六进制开头用的</span><br><span class="line"> 2   3    7</span><br><span class="line">10  0011 0111</span><br><span class="line">结果即为 1000110111</span><br></pre></td></tr></table></figure>
