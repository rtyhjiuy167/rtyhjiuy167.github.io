ne">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;!DOCTYPE <span class="meta-keyword">html</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">html</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">meta</span> <span class="attr">charset</span>=<span class="string">&quot;UTF-8&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="javascript">        <span class="comment">//构造函数就是一个普通的函数，其创建方式和普通函数没有区别</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//不同的是构造函数习惯上首字母大写</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//构造函数和普通函数的区别就是调用方式的不同</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//不同函数就是直接调用，而构造函数需要使用new关键字来调用</span></span></span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">Dog</span>(<span class="params"></span>) </span>&#123;</span></span><br><span class="line"></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> dog1 = Dog();</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> dog2 = <span class="keyword">new</span> Dog();</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(dog1);<span class="comment">//undefined</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(dog2);<span class="comment">//Dog</span></span></span><br><span class="line">        /** </span><br><span class="line">         * 构造函数的执行流程</span><br><span class="line"><span class="javascript">         *  <span class="number">1.</span>用<span class="keyword">new</span> 立刻创建一个对象</span></span><br><span class="line"><span class="javascript">         *  <span class="number">2.</span>将新建的对象设置为函数中的<span class="built_in">this</span>,在构造函数可以使用<span class="built_in">this</span>来引用新建的对象</span></span><br><span class="line">         *  3.逐行执行函数中的代码</span><br><span class="line">         *  4.将新建的对象作为返回值返回</span><br><span class="line">        */</span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line"><span class="javascript">         *  在新建的对象添加属性应用<span class="built_in">this</span>，否则是会变成全局的变量</span></span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        name = <span class="string">&quot;全局&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="built_in">window</span>.name);<span class="comment">//全局</span></span></span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">Location</span>(<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            name = <span class="string">&quot;局部&quot;</span>;</span></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> loc = <span class="keyword">new</span> Location();</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(loc.name);<span class="comment">//undefined</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="built_in">window</span>.name);<span class="comment">//局部</span></span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">Person</span>(<span class="params">name, age, gender</span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">this</span>.name = name;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">this</span>.age = age;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">this</span>.gender = gender;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">this</span>.sayName = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">                alert(<span class="built_in">this</span>.name);</span></span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> per = <span class="keyword">new</span> Person(<span class="string">&quot;孙悟空&quot;</span>, <span class="number">18</span>, <span class="string">&quot;男&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="comment">//对象创建一定要加new</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(per);</span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line"><span class="javascript">         *  使用<span class="keyword">instanceof</span>可以检查一个对象是否是某个类的实例，且这个类须已定义</span></span><br><span class="line"><span class="javascript">         * 如果是，返回<span class="literal">true</span>；否则返回<span class="literal">false</span></span></span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(per <span class="keyword">instanceof</span> Person);<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(per <span class="keyword">instanceof</span> Dog);<span class="comment">//false</span></span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(per <span class="keyword">instanceof</span> <span class="built_in">Object</span>);<span class="comment">//true</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//使用的对象都是Object的后代，都会是true</span></span></span><br><span class="line"></span><br><span class="line">        /** </span><br><span class="line">         * 目前在Person构造函数中，为每一个对象都添加了一个sayName方法，功能都是相同的</span><br><span class="line">         *  其应该在实例是都是相同的，而不是独立各自唯一的</span><br><span class="line">         *      因为该方法是在构造函数内部定义的</span><br><span class="line">         *          这样会造成每执行一次构造函数就会创建一个新的sayName方法，各自独立</span><br><span class="line">         *              如果实例n个，则会创建n个这个方法，但是它们都是一模一样的，这是完全没必要的</span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> per1 = <span class="keyword">new</span> Person(<span class="string">&quot;孙悟空&quot;</span>, <span class="number">18</span>, <span class="string">&quot;男&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> per2 = <span class="keyword">new</span> Person(<span class="string">&quot;猪八戒&quot;</span>, <span class="number">28</span>, <span class="string">&quot;男&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(per1.sayName == per2.sayName);<span class="comment">//false</span></span></span><br><span class="line"></span><br><span class="line"><span class="javascript">        <span class="comment">//将sayName方法在全局作用域中定义</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//  但这个又有一个问题，其污染了全局作用域的命名空间，其它的就不能用此名</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//      这样做，其它人在开发时可能不知道你用了此名，再用会覆盖掉你的</span></span></span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">Person_1</span>(<span class="params">name, age, gender</span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">this</span>.name = name;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">this</span>.age = age;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">this</span>.gender = gender;</span></span><br><span class="line"><span class="javascript">            <span class="built_in">this</span>.sayName = sayName;</span></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="function"><span class="keyword">function</span> <span class="title">sayName</span>(<span class="params"></span>) </span>&#123;</span></span><br><span class="line"><span class="javascript">            alert(<span class="built_in">this</span>.name);</span></span><br><span class="line">        &#125;</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> per_1 = <span class="keyword">new</span> Person_1(<span class="string">&quot;孙悟空&quot;</span>, <span class="number">18</span>, <span class="string">&quot;男&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> per_2 = <span class="keyword">new</span> Person_1(<span class="string">&quot;猪八戒&quot;</span>, <span class="number">28</span>, <span class="string">&quot;男&quot;</span>);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(per_1.sayName == per_2.sayName);<span class="comment">//true</span></span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
