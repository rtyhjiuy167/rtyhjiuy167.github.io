omment">            标识符中可以含有字母、数字、_、$，但是不能以数字开头</span></span><br><span class="line"><span class="comment">         </span></span><br><span class="line"><span class="comment">         数据类型指的是字面量的类型</span></span><br><span class="line"><span class="comment">         在JS中一共由六种数据类型</span></span><br><span class="line"><span class="comment">            String 字符串 </span></span><br><span class="line"><span class="comment">            Number 数值</span></span><br><span class="line"><span class="comment">            Boolean 布尔值</span></span><br><span class="line"><span class="comment">            Null 空值</span></span><br><span class="line"><span class="comment">            Undefined 未定义</span></span><br><span class="line"><span class="comment">            Object 对象</span></span><br><span class="line"><span class="comment">             String Number Boolean Null Undefined属于基本数据类型</span></span><br><span class="line"><span class="comment">             Object属于引用数据类型</span></span><br><span class="line"><span class="comment">        */</span></span><br></pre></td></tr></table></figure>

ss="comment"> *  基本数据类型的值直接在栈内存中存储</span></span><br><span class="line"><span class="comment"> * </span></span><br><span class="line"><span class="comment"> * 对象是保存在堆中内存中的，每创建一个新的对象，就会在堆内存中开辟出一个新的空间</span></span><br><span class="line"><span class="comment"> *  而变量保存的是对象地址（对象的引用），如果两个变量保存的是同一个对象引用，</span></span><br><span class="line"><span class="comment"> * 当通过一个修改时属性时，另一个也会改  可类比指针</span></span><br><span class="line"><span class="comment">*/</span></span><br></pre></td></tr></table></figure>

<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//创建的全局变量都会作为到window对象的属性保存</span></span><br><span class="line"><span class="comment">//创建的全局函数都会作为到window对象的属性保存</span></span><br><span class="line"><span class="keyword">var</span> a =<span class="number">10</span>;</span><br><span class="line"><span class="built_in">console</span>.log(<span class="built_in">window</span>.a);</span><br></pre></td></tr></table></figure>

<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//用小括号表示其是一个整体</span></span><br><span class="line">(<span class="function"><span class="keyword">function</span>(<span class="params">a,b</span>)</span>&#123;</span><br><span class="line">    alert(<span class="string">&quot;我是一个匿名函数~~~&quot;</span>+a+b);</span><br><span class="line">&#125;)(<span class="number">123</span>,<span class="number">456</span>);<span class="comment">//立即执行函数</span></span><br></pre></td></tr></table></figure>

<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//使用var关键字声明的变量，会在该作用域内的代码执行之前被声明（但是不会提前赋值）</span></span><br><span class="line"><span class="comment">//如果声明变量时不使用var关键字，则变量不会被声明提前，且在函数中没有使用var声明的变量都会成为全局变量</span></span><br><span class="line"><span class="comment">//函数声名提前</span></span><br><span class="line">	<span class="comment">//使用function 函数()&#123;&#125;会在所有的代码执行之前被声明</span></span><br><span class="line"><span class="comment">//var w = function()&#123;&#125;;//仅仅只是提前声明了变量w;</span></span><br></pre></td></tr></table></figure>

<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//当再函数作用域操作一个变量时，它会先在自身作用域中寻找，如果有就直接使用</span></span><br><span class="line"><span class="comment">//  如果没有则向上一级作用域中寻找，知道找到全局作用域</span></span><br><span class="line"><span class="comment">//如果全局作用域中依然没有找到，则会报错ReferenceError</span></span><br></pre></td></tr></table></figure>

<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//解析器在调用函数时每次都会向函数内部传递进一个隐含的参数，这个隐含的参数就是this，this指向的是一个对象，这个对象我们称为函数执行的 上下文 </span></span><br><span class="line"><span class="comment">//根据函数的调用形式不同，thi会指向不同的对象</span></span><br><span class="line"><span class="comment">//	以函数的形式调用时，this永远都是window</span></span><br><span class="line"><span class="comment">//	以方法的形式调用时，this就是调用方法的那个对象</span></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">fun</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">    <span class="built_in">console</span>.log(<span class="built_in">this</span>);</span><br><span class="line">&#125;</span><br><span class="line">fun();<span class="comment">//Window</span></span><br><span class="line"><span class="keyword">var</span> obj = &#123;</span><br><span class="line">    say:fun</span><br><span class="line">&#125;;</span><br><span class="line">obj.say();<span class="comment">//Object</span></span><br></pre></td></tr></table></figure>
