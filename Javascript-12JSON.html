pan class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">head</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">meta</span> <span class="attr">charset</span>=<span class="string">&quot;UTF-8&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="javascript">        <span class="comment">//JSON JavaScript中的对象只有自己认识，其它语言都不认识</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">// JSON就是一个特殊的字符串，这个字符串可以被任意的语言所识别</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//  并且可以转换为任意语言的对象，JSON在开发中主要用来数据的交互</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">// JSON  JavaScript Object Notation JS对象表示法</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">// JSON和JS对象的公式一样，只不过JSON字符串中的属性名必须加双引号</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//      不能是单引号</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">// JSON分类 1.对象&#123;&#125;  2.数组[]</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">// JSON中允许的值 </span></span></span><br><span class="line"><span class="javascript">        <span class="comment">// 1.字符串 2.数字 3.布尔值 4.null 5.普通对象（不能是函数） 6.数组</span></span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> obj = <span class="string">&#x27;&#123;&quot;name&quot;:&quot;孙悟空&quot;,&quot;age&quot;:18,&quot;gender&quot;:&quot;男&quot;&#125;&#x27;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> arr = <span class="string">&#x27;[1,2,3,&quot;hello&quot;,true]&#x27;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> obj2 = <span class="string">&#x27;&#123;&quot;arr&quot;:[1,2,3]&#125;&#x27;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> arr2 = <span class="string">&#x27;[&#123;&quot;name&quot;:孙悟空,&quot;age&quot;:18,&quot;gender&quot;:&quot;男&quot;&#125;,&#123;&quot;name&quot;:孙悟空,&quot;age&quot;:18,&quot;gender&quot;:&quot;男&quot;&#125;]&#x27;</span>;</span></span><br><span class="line">        /** </span><br><span class="line"><span class="javascript">         * <span class="built_in">JSON</span> -&gt; JS对象</span></span><br><span class="line"><span class="javascript">         * <span class="built_in">JSON</span>.pars()</span></span><br><span class="line"><span class="javascript">         *      参数为<span class="built_in">JSON</span>字符串</span></span><br><span class="line">         * </span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> o = <span class="built_in">JSON</span>.parse(obj);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(o.gender);<span class="comment">//男</span></span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> o2 = <span class="built_in">JSON</span>.parse(arr);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(o2[<span class="number">1</span>]);<span class="comment">//2</span></span></span><br><span class="line">        /** </span><br><span class="line"><span class="javascript">         * JS对象 -&gt;<span class="built_in">JSON</span></span></span><br><span class="line">        */</span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> obj3 = &#123; <span class="string">&quot;name&quot;</span>: <span class="string">&quot;孙悟空&quot;</span>, <span class="string">&quot;age&quot;</span>: <span class="number">18</span>, <span class="string">&quot;gender&quot;</span>: <span class="string">&quot;男&quot;</span> &#125;;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="built_in">JSON</span>.stringify(obj3));</span></span><br><span class="line"></span><br><span class="line"><span class="javascript">        <span class="comment">//eval() 可以执行一段字符串形式的JS代码</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">// 如果使用eval()执行的字符串中含有&#123;&#125;,它会将&#123;&#125;当成代码块</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">//  如果不希望将其当成代码块解析，则需要在字符串前后各加一个()</span></span></span><br><span class="line"><span class="javascript">        <span class="comment">// 但在开发中尽量不要使用，有安全隐患,由用户传恶意代码可能造成危险</span></span></span><br><span class="line"><span class="javascript">        <span class="keyword">var</span> str1 = <span class="string">&quot;alert(1)&quot;</span>;</span></span><br><span class="line"><span class="javascript">        <span class="built_in">eval</span>(str1);</span></span><br><span class="line"><span class="javascript">        <span class="built_in">console</span>.log(<span class="built_in">eval</span>(<span class="string">&quot;(&quot;</span> + obj + <span class="string">&quot;)&quot;</span>));</span></span><br><span class="line"></span><br><span class="line">    <span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">body</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;/<span class="name">html</span>&gt;</span></span><br></pre></td></tr></table></figure>
